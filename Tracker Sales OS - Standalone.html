        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                const loading = document.getElementById("__bundler_loading");
                function setStatus(msg) {
                    if (loading) loading.textContent = msg;
                }

                // Error sink persists across replaceWith since it's on window, not the DOM.
                window.addEventListener(
                    "error",
                    function (e) {
                        var p = document.body || document.documentElement;
                        var d =
                            document.getElementById("__bundler_err") ||
                            p.appendChild(document.createElement("div"));
                        d.id = "__bundler_err";
                        d.style.cssText =
                            "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
                        d.textContent =
                            (d.textContent
                                ? d.textContent + String.fromCharCode(10)
                                : "") +
                            "[bundle] " +
                            (e.message || e.type) +
                            (e.filename
                                ? " (" +
                                  e.filename.slice(0, 60) +
                                  ":" +
                                  e.lineno +
                                  ")"
                                : "");
                    },
                    true,
                );

                try {
                    const manifestEl = document.querySelector(
                        'script[type="__bundler/manifest"]',
                    );
                    const templateEl = document.querySelector(
                        'script[type="__bundler/template"]',
                    );
                    if (!manifestEl || !templateEl) {
                        setStatus("Error: missing bundle data");
                        console.error(
                            "[bundler] Missing script tags — manifestEl:",
                            !!manifestEl,
                            "templateEl:",
                            !!templateEl,
                        );
                        return;
                    }

                    const manifest = JSON.parse(manifestEl.textContent);
                    let template = JSON.parse(templateEl.textContent);

                    const uuids = Object.keys(manifest);
                    setStatus("Unpacking " + uuids.length + " assets...");

                    const blobUrls = {};
                    await Promise.all(
                        uuids.map(async (uuid) => {
                            const entry = manifest[uuid];
                            try {
                                const binaryStr = atob(entry.data);
                                const bytes = new Uint8Array(binaryStr.length);
                                for (let i = 0; i < binaryStr.length; i++)
                                    bytes[i] = binaryStr.charCodeAt(i);

                                let finalBytes = bytes;
                                if (entry.compressed) {
                                    if (
                                        typeof DecompressionStream !==
                                        "undefined"
                                    ) {
                                        const ds = new DecompressionStream(
                                            "gzip",
                                        );
                                        const writer = ds.writable.getWriter();
                                        const reader = ds.readable.getReader();
                                        writer.write(bytes);
                                        writer.close();
                                        const chunks = [];
                                        let totalLen = 0;
                                        while (true) {
                                            const { done, value } =
                                                await reader.read();
                                            if (done) break;
                                            chunks.push(value);
                                            totalLen += value.length;
                                        }
                                        finalBytes = new Uint8Array(totalLen);
                                        let offset = 0;
                                        for (const chunk of chunks) {
                                            finalBytes.set(chunk, offset);
                                            offset += chunk.length;
                                        }
                                    } else {
                                        console.warn(
                                            "DecompressionStream not available, asset " +
                                                uuid +
                                                " may not render",
                                        );
                                    }
                                }

                                blobUrls[uuid] = URL.createObjectURL(
                                    new Blob([finalBytes], {
                                        type: entry.mime,
                                    }),
                                );
                            } catch (err) {
                                console.error(
                                    "Failed to decode asset " + uuid + ":",
                                    err,
                                );
                                blobUrls[uuid] = URL.createObjectURL(
                                    new Blob([], { type: entry.mime }),
                                );
                            }
                        }),
                    );

                    const extResEl = document.querySelector(
                        'script[type="__bundler/ext_resources"]',
                    );
                    const extResources = extResEl
                        ? JSON.parse(extResEl.textContent)
                        : [];
                    const resourceMap = {};
                    for (const entry of extResources) {
                        if (blobUrls[entry.uuid])
                            resourceMap[entry.id] = blobUrls[entry.uuid];
                    }

                    setStatus("Rendering...");
                    for (const uuid of uuids)
                        template = template.split(uuid).join(blobUrls[uuid]);

                    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
                    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
                    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
                    template = template
                        .replace(/\s+integrity="[^"]*"/gi, "")
                        .replace(/\s+crossorigin="[^"]*"/gi, "");

                    const resourceScript =
                        "<script>window.__resources = " +
                        JSON.stringify(resourceMap)
                            .split("</" + "script>")
                            .join("<\\/" + "script>") +
                        ";</" +
                        "script>";
                    // Inject after <head> so the DOCTYPE stays first; prepending the script
                    // would push the parser into quirks mode. DOMParser always emits a <head>
                    // (synthesizing one if the source HTML omitted it) but may carry
                    // attributes through, so match the full opening tag. slice() rather than
                    // replace() keeps us clear of $-pattern substitution in resourceScript.
                    const headOpen = template.match(/<head[^>]*>/i);
                    if (headOpen) {
                        const i = headOpen.index + headOpen[0].length;
                        template =
                            template.slice(0, i) +
                            resourceScript +
                            template.slice(i);
                    }

                    // Parse the template and swap the root element. Scripts inserted via
                    // DOMParser/replaceWith are inert per spec — re-create each with
                    // createElement so they execute, awaiting onload for src scripts to
                    // preserve ordering (React before ReactDOM before Babel before text/babel).
                    const doc = new DOMParser().parseFromString(
                        template,
                        "text/html",
                    );
                    document.documentElement.replaceWith(doc.documentElement);
                    const dead = Array.from(document.scripts);
                    for (const old of dead) {
                        const s = document.createElement("script");
                        for (const a of old.attributes)
                            s.setAttribute(a.name, a.value);
                        s.textContent = old.textContent;
                        // text/babel scripts with a src: fetch and inline. transformScriptTags
                        // does XHR against the src, but blob:null/ from a file:// origin is
                        // silently dropped. Inlining makes it a plain inline babel script,
                        // which transformScriptTags handles unconditionally.
                        if (
                            (s.type === "text/babel" ||
                                s.type === "text/jsx") &&
                            s.src
                        ) {
                            const r = await fetch(s.src);
                            s.textContent = await r.text();
                            s.removeAttribute("src");
                        }
                        const p = s.src
                            ? new Promise(function (r) {
                                  s.onload = s.onerror = r;
                              })
                            : null;
                        old.replaceWith(s);
                        if (p) await p;
                    }
                    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
                    // which fired before we swapped the document. Trigger manually if present.
                    if (
                        window.Babel &&
                        typeof window.Babel.transformScriptTags === "function"
                    ) {
                        window.Babel.transformScriptTags();
                    }
                } catch (err) {
                    setStatus("Error unpacking: " + err.message);
                    console.error("Bundle unpack error:", err);
                }
            });
        </script>

ht=\"9.5\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"4\" width=\"3\" height=\"13.5\" rx=\"1\"><\u002Frect><\u002Fsvg>\n        <span>Coaching<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"showView('reportes')\" id=\"nav-reportes\" class=\"navbtn\">\n        <svg class=\"ni\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M5 2.5h8l4 4V17a.5.5 0 0 1-.5.5h-11A.5.5 0 0 1 5 17V3a.5.5 0 0 1 0-.5z\"><\u002Fpath><path d=\"M13 2.5V7h4.5\"><\u002Fpath><line x1=\"7.5\" y1=\"10.5\" x2=\"12.5\" y2=\"10.5\"><\u002Fline><line x1=\"7.5\" y1=\"13.5\" x2=\"12.5\" y2=\"13.5\"><\u002Fline><\u002Fsvg>\n        <span>Reportes Dirección<\u002Fspan>\n      <\u002Fbutton>\n\n      <div class=\"sb-section\">Configuración<\u002Fdiv>\n      <button onclick=\"showView('equipo')\" id=\"nav-equipo\" class=\"navbtn\">\n        <svg class=\"ni\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><circle cx=\"10\" cy=\"6.5\" r=\"3\"><\u002Fcircle><path d=\"M3.5 17a6.5 6.5 0 0 1 13 0\"><\u002Fpath><\u002Fsvg>\n        <span>Equipo<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"showView('datos')\" id=\"nav-datos\" class=\"navbtn\">\n        <svg class=\"ni\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><ellipse cx=\"10\" cy=\"5.5\" rx=\"7\" ry=\"2.5\"><\u002Fellipse><path d=\"M3 5.5v9c0 1.38 3.13 2.5 7 2.5s7-1.12 7-2.5v-9\"><\u002Fpath><path d=\"M3 10c0 1.38 3.13 2.5 7 2.5s7-1.12 7-2.5\" stroke-opacity=\".5\"><\u002Fpath><\u002Fsvg>\n        <span>Importar / Exportar<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fnav>\n\n    <div class=\"sb-footer\">\n      <div class=\"sb-role-lbl\">Vista de usuario<\u002Fdiv>\n      <select id=\"user-role\" onchange=\"setRole(this.value)\"><\u002Fselect>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <main id=\"app-main\" class=\"locked\">\n    <header id=\"app-header\">\n      <div>\n        <div id=\"view-title\">Dashboard<\u002Fdiv>\n        <div id=\"view-subtitle\">Sistema operativo comercial<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"header-actions\">\n        <button onclick=\"quickTask()\" class=\"btn-ghost\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 1v10M1 6h10\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Tarea\n        <\u002Fbutton>\n        <button onclick=\"openClientForm()\" class=\"btn-ghost\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 1v10M1 6h10\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Prospecto\n        <\u002Fbutton>\n        <button onclick=\"showView('actividad')\" class=\"btn-green\">Registrar actividad<\u002Fbutton>\n        <button onclick=\"logout()\" class=\"btn-ghost\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M8 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h4M13 7l4 3-4 3M8 10h9\"><\u002Fpath><\u002Fsvg>\n          Salir\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n    <section id=\"content-area\"><\u002Fsection>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<script>\n/* ===================== CONSTANTS ===================== */\nconst FASES = {\n  Prospecto:\"Prospecto\", Contactado:\"Contactado\", Interesado:\"Interesado\",\n  Propuesta:\"Propuesta\", Negociacion:\"Negociación\", Cierre:\"Cierre\", Perdido:\"Perdido\"\n};\nconst TASK_POINTS = {\n  \"Chat\":1,\"WhatsApp\":1,\"Correo\":1,\"Llamada\":3,\"Videoconferencia\":6,\n  \"Reunión virtual\":6,\"Visita física\":10,\"Reunión presencial\":10,\"Propuesta\":8,\"Seguimiento\":3,\"Cierre\":25\n};\n\n/* ===================== DB ===================== */\nlet db = JSON.parse(localStorage.getItem('tracker_sales_os_v1')) || {\n  users:[{id:1,username:'admin',password:'tracker2026',name:'Dirección Comercial',role:'Admin',sellerName:'Admin',active:true}],\n  settings:{dailyMinPoints:30},\n  sellers:[\n    {id:1,name:'Fernanda',active:true,profile:'Ejecutiva / cuentas estratégicas'},\n    {id:2,name:'Nancy',active:true,profile:'Transportistas / requiere cierre'},\n    {id:3,name:'Montserrat',active:true,profile:'Talento / requiere estructura'},\n    {id:4,name:'Asunción',active:true,profile:'Nuevo / requiere prospección guiada'},\n    {id:5,name:'Israel',active:true,profile:'Seguimiento / requiere guía diaria'}\n  ],\n  clients:[\n    {id:101,name:'Transportes Salas',contact:'Luis',phone:'',email:'',type:'Existente',person:'Moral',source:'Prospección',seller:'Nancy',stage:'Interesado',units:0,expectedAmount:0,provider:'',pain:'Interés en cámaras y monitoreo',nextStep:'Llamar para revisar siguiente nivel de cámaras',nextDate:'',nextTime:'',logs:[]}\n  ],\n  tasks:[],activities:[],sales:[],atc:[],directionSales:[]\n};\n\nif(!db.users) db.users=[{id:1,username:'admin',password:'tracker2026',name:'Dirección Comercial',role:'Admin',sellerName:'Admin',active:true}];\nif(!db.settings) db.settings={dailyMinPoints:30};\nif(!db.settings.dailyMinPoints||db.settings.dailyMinPoints<30) db.settings.dailyMinPoints=30;\nif(!db.settings.monthlyAmountGoal) db.settings.monthlyAmountGoal=600000;\nif(!db.settings.monthlyUnitGoal) db.settings.monthlyUnitGoal=150;\nif(!db.settings.sellerMonthlyAmountGoal) db.settings.sellerMonthlyAmountGoal=150000;\nif(!db.atc) db.atc=[];\nif(!db.directionSales) db.directionSales=[];\ndb.clients=(db.clients||[]).map(c=>{\n  if(!c.contacts){c.contacts=[];if(c.contact||c.phone||c.email)c.contacts.push({id:Date.now()+Math.floor(Math.random()*100000),name:c.contact||'',role:'Contacto principal',phone:c.phone||'',email:c.email||'',isDecisionMaker:false});}\n  return c;\n});\nlet currentUser=null, currentRole='Admin';\nconst save=()=>localStorage.setItem('tracker_sales_os_v1',JSON.stringify(db));\nconst todayISO=()=>new Date().toISOString().slice(0,10);\nconst nowTime=()=>new Date().toTimeString().slice(0,5);\nconst nowStamp=()=>new Date().toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'});\nconst tomorrowISO=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};\nconst minutesBetween=(sd,st,ci)=>{if(!sd||!st||!ci)return null;const s=new Date(`${sd}T${st}`),c=new Date(ci);if(isNaN(s.getTime())||isNaN(c.getTime()))return null;return Math.round((c-s)/60000);};\nconst money=n=>'$'+(Number(n||0)).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});\nconst byRole=item=>currentRole==='Admin'||item.seller===currentRole;\nconst activeSellers=()=>db.sellers.filter(s=>s.active);\n\n/* ===================== AUTH ===================== */\nfunction init(){\n  const sess=JSON.parse(sessionStorage.getItem('tracker_sales_os_session')||'null');\n  if(sess){const u=db.users.find(x=>x.active&&x.username===sess.username);if(u){currentUser=u;currentRole=u.role==='Admin'?'Admin':u.sellerName;document.getElementById('login-screen').style.display='none';document.getElementById('app-sidebar').classList.remove('locked');document.getElementById('app-main').classList.remove('locked');}}\n  initRoles(); showView('dashboard');\n}\nfunction initRoles(){\n  const sel=document.getElementById('user-role');\n  if(currentUser&&currentUser.role!=='Admin'){sel.innerHTML=`<option value=\"${currentUser.sellerName}\">${currentUser.sellerName.toUpperCase()}<\u002Foption>`;sel.disabled=true;currentRole=currentUser.sellerName;}\n  else{sel.innerHTML=`<option value=\"Admin\">DIRECCIÓN COMERCIAL<\u002Foption>`+activeSellers().map(s=>`<option value=\"${s.name}\">${s.name.toUpperCase()}<\u002Foption>`).join('');sel.disabled=false;}\n  sel.value=currentRole;\n}\nfunction setRole(v){if(currentUser&&currentUser.role!=='Admin')return;currentRole=v;showView('dashboard');}\nfunction login(username,password){\n  const u=db.users.find(x=>x.active&&x.username===username&&x.password===password);\n  if(!u)return false;\n  currentUser=u;currentRole=u.role==='Admin'?'Admin':u.sellerName;\n  sessionStorage.setItem('tracker_sales_os_session',JSON.stringify({username:u.username}));\n  document.getElementById('login-screen').style.display='none';\n  document.getElementById('app-sidebar').classList.remove('locked');\n  document.getElementById('app-main').classList.remove('locked');\n  initRoles(); showView('dashboard'); return true;\n}\nfunction logout(){\n  sessionStorage.removeItem('tracker_sales_os_session');currentUser=null;currentRole='Admin';\n  document.getElementById('login-screen').style.display='flex';\n  document.getElementById('app-sidebar').classList.add('locked');\n  document.getElementById('app-main').classList.add('locked');\n}\nfunction resetAdminAccess(){\n  db.users=db.users||[];let admin=db.users.find(u=>u.username==='admin');\n  if(!admin){admin={id:1,username:'admin',password:'tracker2026',name:'Dirección Comercial',role:'Admin',sellerName:'Admin',active:true};db.users.unshift(admin);}\n  admin.password='tracker2026';admin.role='Admin';admin.sellerName='Admin';admin.active=true;save();\n  document.getElementById('login-user').value='admin';document.getElementById('login-pass').value='tracker2026';\n  alert('Acceso admin restablecido. Da clic en Entrar.');\n}\ndocument.getElementById('login-form').onsubmit=e=>{\n  e.preventDefault();\n  const ok=login(document.getElementById('login-user').value.trim(),document.getElementById('login-pass').value);\n  document.getElementById('login-error').classList.toggle('hidden',ok);\n};\n\n/* ===================== NAVIGATION ===================== */\nfunction showView(view){\n  const area=document.getElementById('content-area');\n  const subtitles={dashboard:'Visión ejecutiva de esfuerzo, calidad, pipeline y ventas',miDia:'Qué debo hacer hoy y qué sigue',clientes:'Expediente comercial centralizado',agenda:'Tareas, compromisos y seguimientos',actividad:'Llamadas, reuniones y avances con próximo paso obligatorio',pipeline:'Fases comerciales por oportunidad',ventas:'Registro de cierre, facturación y origen',coaching:'Indicadores para corregir metodología comercial',reportes:'Informes ejecutivos mensuales para Dirección y Presidencia',equipo:'Altas, bajas y perfiles',datos:'Respaldo, migración y exportación'};\n  const titles={dashboard:'Dashboard',miDia:'Mi día',clientes:'Clientes / Prospectos',agenda:'Agenda y tareas',actividad:'Registrar actividad',pipeline:'Pipeline',ventas:'Ventas',coaching:'Coaching comercial',reportes:'Reportes Dirección',equipo:'Equipo comercial',datos:'Importar / Exportar'};\n  document.getElementById('view-title').innerText=titles[view];\n  document.getElementById('view-subtitle').innerText=subtitles[view];\n  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));\n  const nb=document.getElementById('nav-'+view);if(nb)nb.classList.add('active');\n  area.innerHTML='';\n  ({dashboard:renderDashboard,miDia:renderMiDia,clientes:renderClientes,agenda:renderAgenda,actividad:renderActividad,pipeline:renderPipeline,ventas:renderVentas,coaching:renderCoaching,reportes:renderReportes,equipo:renderEquipo,datos:renderDatos}[view])(area);\n}\n\n/* ===================== KPI HELPERS ===================== */\nfunction kpis(){\n  const acts=db.activities.filter(byRole),tasks=db.tasks.filter(byRole),sales=db.sales.filter(byRole);\n  const effort=acts.reduce((a,b)=>a+(TASK_POINTS[b.type]||0),0);\n  const quality=acts.length?Math.round(acts.reduce((a,b)=>a+(b.quality||0),0)/acts.length):0;\n  const overdue=tasks.filter(t=>!t.completed&&t.date&&t.date<todayISO()).length;\n  const dueToday=tasks.filter(t=>!t.completed&&t.date===todayISO()).length;\n  return{acts,tasks,sales,effort,quality,overdue,dueToday,\n    units:sales.reduce((a,b)=>a+Number(b.units||0),0),\n    amount:sales.reduce((a,b)=>a+Number(b.amount||0),0)};\n}\nfunction getActivityTrendData(){\n  const labels=[],data=[];\n  for(let i=13;i>=0;i--){\n    const d=new Date();d.setDate(d.getDate()-i);\n    const iso=d.toISOString().slice(0,10);\n    labels.push(d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric'}));\n    data.push(db.activities.filter(a=>byRole(a)&&a.date===iso).reduce((s,a)=>s+(TASK_POINTS[a.type]||0),0));\n  }\n  return{labels,data};\n}\nlet _chartInstance=null;\nfunction initActivityChart(){\n  const ctx=document.getElementById('activity-chart');\n  if(!ctx)return;\n  if(_chartInstance){_chartInstance.destroy();_chartInstance=null;}\n  const trend=getActivityTrendData();\n  _chartInstance=new Chart(ctx,{\n    type:'line',\n    data:{labels:trend.labels,datasets:[{data:trend.data,borderColor:'#82bc00',backgroundColor:'rgba(130,188,0,0.08)',borderWidth:2,fill:true,tension:0.35,pointRadius:3.5,pointBackgroundColor:'#82bc00',pointBorderColor:'#fff',pointBorderWidth:1.5}]},\n    options:{\n      responsive:true,maintainAspectRatio:false,\n      plugins:{legend:{display:false},tooltip:{backgroundColor:'#001524',titleColor:'#82bc00',titleFont:{family:'Inter',weight:'600',size:11},bodyColor:'#fff',bodyFont:{family:'Inter',size:12},padding:10,cornerRadius:8,callbacks:{label:(i)=>` ${i.raw} puntos`}}},\n      scales:{\n        x:{grid:{display:false},border:{display:false},ticks:{font:{size:10,family:'Inter'},color:'#94A3B8',maxRotation:0,maxTicksLimit:7}},\n        y:{grid:{color:'rgba(0,0,0,0.04)'},border:{display:false},ticks:{font:{size:10,family:'Inter'},color:'#94A3B8',padding:6},beginAtZero:true}\n      }\n    }\n  });\n}\n\n/* ===================== RENDER DASHBOARD ===================== */\nfunction renderDashboard(area){\n  const K=kpis();\n  const active=activeSellers().length;\n  const metaAmount=db.settings.monthlyAmountGoal||active*(db.settings.sellerMonthlyAmountGoal||150000);\n  const amtPct=metaAmount>0?((K.amount/metaAmount)*100).toFixed(1):'0';\n  area.innerHTML=`\n    <div class=\"kpi-strip\" style=\"margin-bottom:18px\">\n      <div class=\"kpi-cell ac\">\n        <div class=\"kl\">Venta registrada<\u002Fdiv>\n        <div class=\"kv\" style=\"font-size:18px\">${money(K.amount)}<\u002Fdiv>\n        <div class=\"ksb\">Meta: ${money(metaAmount)} · ${amtPct}%<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi-cell\">\n        <div class=\"kl\">Unidades<\u002Fdiv>\n        <div class=\"kv\">${K.units}<\u002Fdiv>\n        <div class=\"ksb\">Meta: ${db.settings.monthlyUnitGoal||active*50}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi-cell\">\n        <div class=\"kl\">Esfuerzo total<\u002Fdiv>\n        <div class=\"kv\">${K.effort} <span style=\"font-size:13px;font-weight:400;color:#94A3B8\">pts<\u002Fspan><\u002Fdiv>\n        <div class=\"ksb\">Mín. diario: ${db.settings.dailyMinPoints}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi-cell\">\n        <div class=\"kl\">Calidad promedio<\u002Fdiv>\n        <div class=\"kv\">${K.quality}<span style=\"font-size:13px;font-weight:400;color:#94A3B8\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"ksb\">Notas y compromisos<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 276px;gap:16px;margin-bottom:16px\">\n      <div class=\"card\" style=\"padding:20px 22px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px\">\n          <div>\n            <div class=\"slabel\" style=\"margin-bottom:3px\">Actividad · últimos 14 días<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;color:#0F172A;letter-spacing:-0.01em\">${K.effort} <span style=\"font-size:12px;color:#94A3B8;font-weight:400\">puntos de esfuerzo<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:150px;position:relative\"><canvas id=\"activity-chart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:20px 22px\">\n        <div class=\"slabel\" style=\"margin-bottom:13px\">Alertas operativas<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          ${alertBox('Seguimientos vencidos',K.overdue,K.overdue>0?'red':'green')}\n          ${alertBox('Tareas para hoy',K.dueToday,'navy')}\n          ${alertBox('Sin próximo paso',db.clients.filter(c=>byRole(c)&&(!c.nextDate||!c.nextStep)).length,'amber')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:20px 22px\">\n      <div class=\"slabel\" style=\"margin-bottom:14px\">Desempeño del equipo<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">${activeSellers().map(s=>sellerScoreCard(s)).join('')}<\u002Fdiv>\n    <\u002Fdiv>`;\n  setTimeout(()=>initActivityChart(),50);\n}\n\nfunction alertBox(label,value,color){\n  const s={navy:{bg:'#EFF6FF',vc:'#002B49'},green:{bg:'#F0FDF4',vc:'#16A34A'},red:{bg:'#FEF2F2',vc:'#DC2626'},amber:{bg:'#FFFBEB',vc:'#D97706'}}[color]||{bg:'#EFF6FF',vc:'#002B49'};\n  return `<div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:${s.bg};border-radius:8px\">\n    <span style=\"font-size:12px;font-weight:500;color:#475569\">${label}<\u002Fspan>\n    <span style=\"font-size:20px;font-weight:700;color:${s.vc}\">${value}<\u002Fspan>\n  <\u002Fdiv>`;\n}\n\nfunction sellerScoreCard(s){\n  const acts=db.activities.filter(a=>a.seller===s.name);\n  const todayActs=acts.filter(a=>a.date===todayISO());\n  const tasks=db.tasks.filter(t=>t.seller===s.name);\n  const effort=acts.reduce((a,b)=>a+(TASK_POINTS[b.type]||0),0);\n  const todayEffort=todayActs.reduce((a,b)=>a+(TASK_POINTS[b.type]||0),0);\n  const quality=acts.length?Math.round(acts.reduce((a,b)=>a+(b.quality||0),0)/acts.length):0;\n  const overdue=tasks.filter(t=>!t.completed&&t.date<todayISO()).length;\n  const dailyPct=Math.min(100,Math.round((todayEffort/(db.settings.dailyMinPoints||30))*100));\n  const score=Math.max(0,Math.min(100,Math.round((dailyPct*.45)+(quality*.35)+Math.min(effort,50)*.4-(overdue*10))));\n  const barColor=score>=75?'#82bc00':score>=45?'#F59E0B':'#EF4444';\n  const badgeBg=score>=75?'#EEFAD4':score>=45?'#FEF3C7':'#FEE2E2';\n  const badgeTx=score>=75?'#4a7c00':score>=45?'#B45309':'#B91C1C';\n  return `<div class=\"seller-row\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:7px\">\n      <div>\n        <span style=\"font-size:13px;font-weight:600;color:#0F172A\">${s.name}<\u002Fspan>\n        <span style=\"font-size:11px;color:#94A3B8;margin-left:8px;font-weight:400\">${s.profile}<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:12px;font-weight:700;color:${badgeTx};background:${badgeBg};padding:2px 9px;border-radius:5px\">${score}%<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"prog\"><div class=\"prog-fill\" style=\"width:${score}%;background:${barColor}\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:18px;margin-top:6px\">\n      <span style=\"font-size:11px;color:#94A3B8\">Hoy: <b style=\"color:#475569;font-weight:600\">${todayEffort}/${db.settings.dailyMinPoints}<\u002Fb><\u002Fspan>\n      <span style=\"font-size:11px;color:#94A3B8\">Calidad: <b style=\"color:#475569;font-weight:600\">${quality}%<\u002Fb><\u002Fspan>\n      <span style=\"font-size:11px;color:#94A3B8\">Vencidos: <b style=\"color:${overdue>0?'#DC2626':'#475569'};font-weight:600\">${overdue}<\u002Fb><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ===================== MI DÍA ===================== */\nfunction renderMiDia(area){\n  const tasks=db.tasks.filter(t=>byRole(t)&&!t.completed).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));\n  const todayTasks=tasks.filter(t=>t.date===todayISO()).length;\n  const tomorrowTasks=tasks.filter(t=>t.date===tomorrowISO()).length;\n  const overdue=tasks.filter(t=>t.date&&t.date<todayISO()).length;\n  const actsToday=db.activities.filter(a=>byRole(a)&&a.date===todayISO());\n  const todayPts=actsToday.reduce((a,b)=>a+(TASK_POINTS[b.type]||0),0);\n  const callsToday=actsToday.filter(a=>a.type==='Llamada').length;\n  const prospectsToday=db.clients.filter(c=>byRole(c)&&c.createdDate===todayISO()).length;\n  area.innerHTML=`\n    <div class=\"kpi-strip\" style=\"margin-bottom:18px\">\n      <div class=\"kpi-cell ac\">\n        <div class=\"kl\">Puntos de hoy<\u002Fdiv>\n        <div class=\"kv\">${todayPts}<span style=\"font-size:13px;color:rgba(255,255,255,0.4);font-weight:400\">/${db.settings.dailyMinPoints}<\u002Fspan><\u002Fdiv>\n        <div class=\"ksb\">Meta de actividad mínima<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi-cell\">\n        <div class=\"kl\">Llamadas hoy<\u002Fdiv>\n        <div class=\"kv\" style=\"color:${callsToday<10?'#DC2626':'#0F172A'}\">${callsToday}<span style=\"font-size:13px;color:#94A3B8;font-weight:400\">/10<\u002Fspan><\u002Fdiv>\n        <div class=\"ksb\">Objetivo recomendado<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi-cell\">\n        <div class=\"kl\">Agenda mañana<\u002Fdiv>\n        <div class=\"kv\" style=\"color:${tomorrowTasks<5?'#DC2626':'#0F172A'}\">${tomorrowTasks}<span style=\"font-size:13px;color:#94A3B8;font-weight:400\">/5<\u002Fspan><\u002Fdiv>\n        <div class=\"ksb\">Planeación mínima<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi-cell\">\n        <div class=\"kl\">Prospectos hoy<\u002Fdiv>\n        <div class=\"kv\" style=\"color:${prospectsToday<2?'#DC2626':'#0F172A'}\">${prospectsToday}<\u002Fdiv>\n        <div class=\"ksb\">Alimenta pipeline si vas bajo<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 276px;gap:16px\">\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div class=\"card\" style=\"padding:20px\">\n          <div class=\"slabel\" style=\"margin-bottom:12px\">Termómetro operativo<\u002Fdiv>\n          ${operationalThermometer(todayPts,callsToday,todayTasks,tomorrowTasks,overdue,prospectsToday)}\n        <\u002Fdiv>\n        <div class=\"card\" style=\"padding:20px\">\n          <div class=\"slabel\" style=\"margin-bottom:13px\">Agenda de hoy y pendientes<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">${tasks.length?tasks.map(taskRow).join(''):empty('No tienes tareas abiertas. Crea agenda para mañana antes de cerrar el día.')}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:20px;align-self:start\">\n        <div class=\"slabel\" style=\"margin-bottom:11px\">Regla del día<\u002Fdiv>\n        <p style=\"font-size:15px;font-weight:700;color:#0F172A;line-height:1.5;margin-bottom:10px\">Registra actividad en tiempo real, no al cierre del día.<\u002Fp>\n        <p style=\"font-size:12px;color:#64748B;line-height:1.65;margin-bottom:20px\">Llamadas, videoconferencias, visitas y propuestas requieren siguiente paso. Chat, WhatsApp y correo no lo requieren salvo que exista compromiso.<\u002Fp>\n        <button onclick=\"quickTask()\" class=\"btn-green\" style=\"width:100%;justify-content:center;margin-bottom:8px\">Crear tarea<\u002Fbutton>\n        <button onclick=\"openClientForm()\" class=\"btn-primary\" style=\"width:100%;justify-content:center\">Nuevo prospecto<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction operationalThermometer(todayPts,callsToday,todayTasks,tomorrowTasks,overdue,prospectsToday){\n  let alerts=[];\n  if(overdue>0) alerts.push(['#DC2626','#FEF2F2','Tienes seguimientos vencidos. Primero atiende lo vencido y actualiza resultado en tiempo real.']);\n  if(todayPts<db.settings.dailyMinPoints) alerts.push(['#D97706','#FFFBEB',`Vas en ${todayPts}/${db.settings.dailyMinPoints} puntos. Te faltan ${db.settings.dailyMinPoints-todayPts} puntos para el mínimo.`]);\n  if(callsToday<10) alerts.push(['#D97706','#FFFBEB',`Llevas ${callsToday}/10 llamadas. Si no tienes suficiente agenda, genera nuevos prospectos.`]);\n  if(tomorrowTasks<5) alerts.push(['#DC2626','#FEF2F2',`Agenda de mañana baja (${tomorrowTasks}/5). Antes de salir deja actividades programadas.`]);\n  if(prospectsToday<2) alerts.push(['#6D28D9','#F5F3FF',`Prospectos nuevos hoy: ${prospectsToday}. Si tu agenda está baja, alimenta pipeline.`]);\n  if(alerts.length===0) alerts.push(['#4a7c00','#F0FDF4','Buen ritmo: tienes puntos, llamadas, agenda futura y pipeline activo. Mantén calidad en notas.']);\n  return `<div style=\"display:flex;flex-direction:column;gap:8px\">${alerts.map(a=>`<div style=\"padding:11px 13px;border-radius:8px;background:${a[1]};font-size:12.5px;font-weight:500;color:${a[0]};line-height:1.5\">${a[2]}<\u002Fdiv>`).join('')}<\u002Fdiv>${activityMixAdvice()}`;\n}\n\nfunction taskRow(t){\n  const late=t.date&&t.date<todayISO();\n  return `<div style=\"padding:13px;border-radius:9px;border:1px solid ${late?'#FCA5A5':'#E2E8F0'};background:${late?'#FFF5F5':'#fff'};display:flex;justify-content:space-between;align-items:flex-start;gap:12px\">\n    <div style=\"flex:1;min-width:0\">\n      <p style=\"font-size:13px;font-weight:600;color:#0F172A;margin-bottom:2px\">${t.clientName||'Sin cliente'} · ${t.type}${t.contact?' · '+t.contact:''}<\u002Fp>\n      <p style=\"font-size:12px;color:#64748B;margin-bottom:5px\">${t.objective||t.desc||''}<\u002Fp>\n      <p style=\"font-size:11.5px;color:#6D28D9;font-weight:500;margin-bottom:3px\">IA: ${aiTaskComment(t)}<\u002Fp>\n      <p style=\"font-size:11px;color:${late?'#DC2626':'#4a7c00'};font-weight:500\">Programada: ${t.date||'Sin fecha'} ${t.time||''} · ${t.seller}<\u002Fp>\n    <\u002Fdiv>\n    <button onclick=\"completeTask(${t.id})\" class=\"btn-green\" style=\"padding:6px 11px;font-size:11px;white-space:nowrap\">Completar<\u002Fbutton>\n  <\u002Fdiv>`;\n}\n\nfunction empty(txt){\n  return `<div class=\"empty-state\">${txt}<\u002Fdiv>`;\n}\n\n/* ===================== CLIENTES ===================== */\nfunction renderClientes(area){\n  const clients=db.clients.filter(byRole);\n  area.innerHTML=`\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px\">\n      <input id=\"client-search\" oninput=\"renderClientes(document.getElementById('content-area'))\" value=\"${document.getElementById('client-search')?.value||''}\" class=\"input\" style=\"max-width:360px\" placeholder=\"Buscar cliente, contacto, dolor...\">\n      <button onclick=\"openClientForm()\" class=\"btn-primary\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 1v10M1 6h10\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><\u002Fsvg>\n        Nuevo cliente\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px\">\n      ${clients.filter(c=>JSON.stringify(c).toLowerCase().includes((document.getElementById('client-search')?.value||'').toLowerCase())).map(clientCard).join('')||empty('Sin clientes registrados')}\n    <\u002Fdiv>`;\n}\n\nfunction clientCard(c){\n  const stageColors={Prospecto:'tag-gray',Contactado:'tag-navy',Interesado:'tag-navy',Propuesta:'tag-amber',Negociacion:'tag-amber',Cierre:'tag-green',Perdido:'tag-red'};\n  return `<div class=\"card\" style=\"padding:15px;transition:box-shadow 0.12s\" onmouseover=\"this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'\" onmouseout=\"this.style.boxShadow=''\">\n    <div onclick=\"clientFile(${c.id})\" style=\"cursor:pointer\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px\">\n        <div style=\"min-width:0\">\n          <h3 style=\"font-size:13px;font-weight:700;color:#0F172A;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">${c.name}<\u002Fh3>\n          <p style=\"font-size:11px;color:#94A3B8\">${primaryContactLabel(c)} · ${c.type}<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"tag ${stageColors[c.stage]||'tag-gray'}\">${c.stage}<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px;color:#64748B;line-height:1.5;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">${c.pain||'Sin dolor registrado'}<\u002Fp>\n      <div style=\"display:flex;justify-content:space-between;font-size:11px;color:#94A3B8;padding-top:9px;border-top:1px solid #F1F5F9\">\n        <span>${c.seller}<\u002Fspan>\n        <span>${c.nextDate?c.nextDate:'Sin próximo paso'}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:7px;margin-top:11px\">\n      <button onclick=\"openClientForm(${c.id})\" class=\"btn-green\" style=\"flex:1;justify-content:center\">Editar<\u002Fbutton>\n      <button onclick=\"deleteClient(${c.id})\" class=\"btn-danger\">Eliminar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction clientFile(id){\n  const c=db.clients.find(x=>x.id===id);\n  const logs=db.activities.filter(a=>a.clientId===id).sort((a,b)=>(b.created||'').localeCompare(a.created||''));\n  document.getElementById('view-title').innerText=c.name;\n  document.getElementById('view-subtitle').innerText='Expediente único del cliente';\n  document.getElementById('content-area').innerHTML=`\n    <button onclick=\"showView('clientes')\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#64748B;background:none;border:none;cursor:pointer;margin-bottom:18px;font-family:inherit\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M9 2L4 7l5 5\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>\n      Volver a clientes\n    <\u002Fbutton>\n    <div style=\"display:grid;grid-template-columns:280px 1fr;gap:18px\">\n      <div>\n        <div style=\"background:#001524;border-radius:12px;padding:22px;margin-bottom:14px\">\n          <h2 style=\"font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.01em;margin-bottom:4px\">${c.name}<\u002Fh2>\n          <p style=\"color:#82bc00;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px\">${c.stage} · ${c.seller}<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:14px;font-size:12px\">\n            <div>\n              <p style=\"font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:7px\">Contactos<\u002Fp>\n              ${clientContacts(c).length?clientContacts(c).map(ct=>`<div style=\"padding:9px 11px;background:rgba(255,255,255,0.07);border-radius:7px;margin-bottom:5px\"><p style=\"color:#fff;font-weight:600;font-size:12px\">${ct.name||'-'} ${ct.isDecisionMaker?'<span style=\"color:#82bc00;font-size:10px\">★ Decisor<\u002Fspan>':''}<\u002Fp><p style=\"color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px\">${ct.role||''}${ct.phone?' · '+ct.phone:''}${ct.email?' · '+ct.email:''}<\u002Fp><\u002Fdiv>`).join(''):'<p style=\"color:rgba(255,255,255,0.4);font-size:12px\">Sin contactos<\u002Fp>'}\n            <\u002Fdiv>\n            <div><p style=\"font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px\">Dolor<\u002Fp><p style=\"color:rgba(255,255,255,0.75)\">${c.pain||'-'}<\u002Fp><\u002Fdiv>\n            <div><p style=\"font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px\">Proveedor actual<\u002Fp><p style=\"color:rgba(255,255,255,0.75)\">${c.provider||'-'}<\u002Fp><\u002Fdiv>\n            <div><p style=\"font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px\">Próximo paso<\u002Fp><p style=\"color:#82bc00;font-weight:600\">${c.nextStep||'Sin próximo paso'}<\u002Fp><p style=\"color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px\">${c.nextDate||''} ${c.nextTime||''}<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"openActivityForClient(${c.id})\" class=\"btn-green\" style=\"width:100%;justify-content:center;margin-top:20px\">Registrar avance<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"padding:16px\">\n          <div class=\"slabel\" style=\"margin-bottom:10px\">Actualizar fase<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:6px\">\n            ${Object.keys(FASES).map(f=>`<button onclick=\"updateStage(${c.id},'${f}')\" style=\"padding:7px;border-radius:7px;font-size:10.5px;font-weight:600;cursor:pointer;border:1.5px solid #E2E8F0;background:${c.stage===f?'#001524':'#fff'};color:${c.stage===f?'#fff':'#475569'};font-family:inherit;transition:all 0.12s\">${FASES[f]}<\u002Fbutton>`).join('')}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:20px\">\n        <div class=\"slabel\" style=\"margin-bottom:14px\">Historial comercial<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;max-height:65vh;overflow-y:auto;padding-right:4px\">\n          ${logs.length?logs.map(logCard).join(''):empty('Sin actividades registradas')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction logCard(a){\n  return `<div class=\"log-card\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n      <div style=\"font-size:13px;font-weight:600;color:#0F172A\">${a.type} · ${a.result}<\u002Fdiv>\n      <span style=\"font-size:11px;color:#94A3B8\">${a.date}<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:11px;color:#64748B;margin-bottom:6px\">Contacto: ${a.contactName?a.contactName+(a.contactRole?' · '+a.contactRole:''):'No especificado'}<\u002Fp>\n    <p style=\"font-size:11px;color:#94A3B8;margin-bottom:8px\">Programada: ${a.programmedAt||'N/A'} · Ejecutada: ${a.executedAt||'N/A'} · Capturada: ${a.capturedAt||'N/A'}${a.delayMinutes!=null?' · Dif: '+a.delayMinutes+' min':''}<\u002Fp>\n    <p style=\"font-size:12px;color:#0F172A;margin-bottom:3px\"><b style=\"font-weight:600\">Qué ocurrió:<\u002Fb> ${a.summary}<\u002Fp>\n    <p style=\"font-size:12px;color:#0F172A;margin-bottom:3px\"><b style=\"font-weight:600\">Descubrí:<\u002Fb> ${a.discovery}<\u002Fp>\n    <p style=\"font-size:12px;color:#0F172A;margin-bottom:8px\"><b style=\"font-weight:600\">Acordamos:<\u002Fb> ${a.agreement}<\u002Fp>\n    <p style=\"font-size:12px;color:#002B49;font-weight:600\">Siguiente paso: ${a.nextStep||'No requerido'}${a.nextDate?' · '+a.nextDate+(a.nextTime?' '+a.nextTime:''):''}<\u002Fp>\n    <div style=\"display:flex;gap:14px;margin-top:8px;padding-top:8px;border-top:1px solid #F1F5F9\">\n      <span style=\"font-size:11px;color:#94A3B8\">Calidad: <b style=\"color:#64748B;font-weight:600\">${a.quality}%<\u002Fb><\u002Fspan>\n      <span style=\"font-size:11px;color:#94A3B8\">Puntos: <b style=\"color:#64748B;font-weight:600\">${a.points||TASK_POINTS[a.type]||0}<\u002Fb><\u002Fspan>\n      <span style=\"font-size:11px;color:#94A3B8\">${a.seller}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction updateStage(id,stage){db.clients.find(c=>c.id===id).stage=stage;save();clientFile(id);}\n\n/* ===================== AGENDA ===================== */\nfunction renderAgenda(area){\n  const tasks=db.tasks.filter(byRole).sort((a,b)=>(a.completed-b.completed)||((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')));\n  area.innerHTML=`\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\">\n      <div style=\"font-size:14px;font-weight:700;color:#0F172A\">Compromisos comerciales<\u002Fdiv>\n      <button onclick=\"quickTask()\" class=\"btn-primary\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 1v10M1 6h10\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><\u002Fsvg>\n        Crear tarea\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px\">${tasks.map(taskRowFull).join('')||empty('Sin tareas registradas')}<\u002Fdiv>`;\n}\n\nfunction taskRowFull(t){\n  return `<div class=\"card\" style=\"padding:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;${t.completed?'opacity:0.5':''}\">\n    <div style=\"flex:1;min-width:0\">\n      <p style=\"font-size:13px;font-weight:600;color:#0F172A;margin-bottom:2px\">${t.clientName||'Sin cliente'} · ${t.type}${t.contact?' · '+t.contact:''}<\u002Fp>\n      <p style=\"font-size:12px;color:#64748B;margin-bottom:4px\">${t.objective||t.desc||''}<\u002Fp>\n      <p style=\"font-size:11.5px;color:#6D28D9;font-weight:500;margin-bottom:4px\">IA: ${aiTaskComment(t)}<\u002Fp>\n      <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n        <span style=\"font-size:11px;color:#94A3B8\">Programada: ${t.date||''} ${t.time||''}<\u002Fspan>\n        <span style=\"font-size:11px;color:#94A3B8\">${t.seller}<\u002Fspan>\n        <span style=\"font-size:11px;color:#94A3B8\">Creada: ${t.createdAt||'No registrado'}<\u002Fspan>\n        ${t.completedAt?`<span style=\"font-size:11px;color:#94A3B8\">Capturada: ${t.completedAt}<\u002Fspan>`:''}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${t.completed?`<span class=\"tag tag-gray\">Completada<\u002Fspan>`:`<button onclick=\"completeTask(${t.id})\" class=\"btn-green\" style=\"padding:6px 11px;font-size:11px\">Completar<\u002Fbutton>`}\n  <\u002Fdiv>`;\n}\n\n/* ===================== ACTIVIDAD ===================== */\nfunction renderActividad(area){area.innerHTML=activityForm();wireActivityForm();}\nfunction openActivityForClient(id){showView('actividad');setTimeout(()=>{document.getElementById('a-client').value=id;},30);}\n\nfunction activityForm(){\n  const clientOptions=db.clients.filter(byRole).map(c=>`<option value=\"${c.id}\">${c.name}<\u002Foption>`).join('');\n  return `<div class=\"card\" style=\"padding:28px;max-width:860px;margin:0 auto\">\n    <h3 style=\"font-size:16px;font-weight:700;color:#0F172A;margin-bottom:4px\">Registrar actividad comercial<\u002Fh3>\n    <p style=\"font-size:12px;color:#94A3B8;margin-bottom:22px\">La hora de captura queda registrada automáticamente. Llamadas, videoconferencias, visitas y propuestas requieren siguiente paso.<\u002Fp>\n    <form id=\"activity-form\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n      <input id=\"a-related-task\" type=\"hidden\">\n      <input id=\"a-programmed\" class=\"input\" placeholder=\"Tarea programada\" readonly>\n      <input id=\"a-captured\" class=\"input\" value=\"Captura: ${nowStamp()}\" readonly>\n      <select id=\"a-client\" class=\"input\" required onchange=\"updateActivityContactOptions()\">${clientOptions}<\u002Fselect>\n      <div id=\"a-contact-select-wrap\"><select id=\"a-contact-id\" class=\"input\"><option value=\"\">Selecciona una empresa<\u002Foption><\u002Fselect><\u002Fdiv>\n      <select id=\"a-type\" class=\"input\" required onchange=\"toggleNextRequirement()\">${Object.keys(TASK_POINTS).map(x=>`<option>${x}<\u002Foption>`).join('')}<\u002Fselect>\n      <select id=\"a-result\" class=\"input\" required><option>Interesado<\u002Foption><option>No contestó<\u002Foption><option>Solicita propuesta<\u002Foption><option>Solicita reunión<\u002Foption><option>Negociación<\u002Foption><option>Cierre ganado<\u002Foption><option>Cierre perdido<\u002Foption><option>Información enviada<\u002Foption><\u002Fselect>\n      <select id=\"a-stage\" class=\"input\" required>${Object.keys(FASES).map(f=>`<option value=\"${f}\">${FASES[f]}<\u002Foption>`).join('')}<\u002Fselect>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <input id=\"a-exec-date\" type=\"date\" class=\"input\" required>\n        <input id=\"a-exec-time\" type=\"time\" class=\"input\" required>\n      <\u002Fdiv>\n      <textarea id=\"a-summary\" class=\"input\" style=\"grid-column:span 2;height:90px\" placeholder=\"¿Qué ocurrió? Ej. Hablé con Luis de Transportes Salas...\" required><\u002Ftextarea>\n      <textarea id=\"a-discovery\" class=\"input\" style=\"grid-column:span 2;height:80px\" placeholder=\"¿Qué descubrí? Dolor, necesidad, proveedor actual, objeción...\" required><\u002Ftextarea>\n      <textarea id=\"a-agreement\" class=\"input\" style=\"grid-column:span 2;height:80px\" placeholder=\"¿Qué acordamos? En chat/correo puede ser: se envió información y se espera respuesta.\" required><\u002Ftextarea>\n      <div id=\"next-fields\" style=\"grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <input id=\"a-next\" class=\"input\" placeholder=\"Siguiente paso concreto\">\n        <input id=\"a-objective\" class=\"input\" placeholder=\"Objetivo del siguiente paso\">\n        <input id=\"a-next-date\" type=\"date\" class=\"input\">\n        <input id=\"a-next-time\" type=\"time\" class=\"input\">\n      <\u002Fdiv>\n      <div id=\"activity-ai\" class=\"ai-box\" style=\"grid-column:span 2\">IA Coach: registra en tiempo real. La hora de captura quedará guardada.<\u002Fdiv>\n      <button class=\"btn-green\" style=\"grid-column:span 2;justify-content:center;padding:10px;font-size:13px\">Guardar actividad<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>`;\n}\n\nfunction wireActivityForm(){\n  document.getElementById('a-exec-date').value=todayISO();\n  document.getElementById('a-exec-time').value=nowTime();\n  updateActivityContactOptions();toggleNextRequirement();\n  document.getElementById('activity-form').onsubmit=e=>{\n    e.preventDefault();\n    const c=db.clients.find(x=>x.id==document.getElementById('a-client').value);\n    const contactId=document.getElementById('a-contact-id')?.value||'';\n    const contactObj=selectedContactFrom(c?.id,contactId);\n    const seller=currentRole==='Admin'?c.seller:currentRole;\n    const type=val('a-type');const requiresNext=needsNextStep(type);\n    if(requiresNext&&(!val('a-next')||!val('a-next-date')||!val('a-next-time'))){alert('Esta actividad requiere siguiente paso, fecha y hora.');return;}\n    const summary=val('a-summary'),discovery=val('a-discovery'),agreement=val('a-agreement'),next=val('a-next'),obj=val('a-objective');\n    const capturedAt=nowStamp(),capturedISO=new Date().toISOString();\n    const quality=calcQuality(summary,discovery,agreement,next,val('a-next-date'),val('a-next-time'));\n    const relatedId=Number(val('a-related-task')||0);\n    const relatedTask=db.tasks.find(t=>t.id===relatedId);\n    let delayMinutes=null;\n    if(relatedTask){relatedTask.completed=true;relatedTask.completedAt=capturedAt;relatedTask.capturedISO=capturedISO;relatedTask.executedAt=val('a-exec-date')+' '+val('a-exec-time');delayMinutes=minutesBetween(relatedTask.date,relatedTask.time,capturedISO);}\n    const act={id:Date.now(),created:new Date().toISOString(),date:todayISO(),capturedAt,capturedISO,executedAt:val('a-exec-date')+' '+val('a-exec-time'),programmedAt:val('a-programmed'),delayMinutes,clientId:c.id,clientName:c.name,seller,contactId,contactName:contactObj?.name||'',contactRole:contactObj?.role||'',contactEmail:contactObj?.email||'',contactPhone:contactObj?.phone||'',type,points:TASK_POINTS[type]||0,result:val('a-result'),stage:val('a-stage'),summary,discovery,agreement,nextStep:next,nextDate:val('a-next-date'),nextTime:val('a-next-time'),quality};\n    db.activities.push(act);c.stage=val('a-stage');\n    if(next){c.nextStep=next;c.nextDate=val('a-next-date');c.nextTime=val('a-next-time');}\n    if(requiresNext){db.tasks.push({id:Date.now()+1,seller,clientId:c.id,clientName:c.name,contactId,contact:contactObj?`${contactObj.name||''}${contactObj.role?' · '+contactObj.role:''}`:'',contactRole:contactObj?.role||'',contactEmail:contactObj?.email||'',contactPhone:contactObj?.phone||'',type:'Seguimiento',objective:obj,desc:next,date:val('a-next-date'),time:val('a-next-time'),createdAt:capturedAt,completed:false,sourceActivity:act.id});}\n    save();const delayText=delayMinutes===null?'':`\\nDiferencia vs hora programada: ${delayMinutes} minutos.`;\n    alert('Actividad guardada con hora de captura: '+capturedAt+delayText);clientFile(c.id);\n  };\n}\n\nfunction needsNextStep(type){return!(type==='Chat'||type==='Correo'||type==='WhatsApp');}\nfunction toggleNextRequirement(){\n  const req=needsNextStep(val('a-type'));\n  ['a-next','a-objective','a-next-date','a-next-time'].forEach(id=>{const el=document.getElementById(id);if(el)el.required=req;});\n  const box=document.getElementById('activity-ai');\n  if(box){const type=val('a-type')||'';const outlook=(type.includes('Videoconferencia')||type.includes('Reunión')||type.includes('Visita'))?' Recuerda registrar o validar la cita en Outlook.':'';box.innerHTML=req?'IA Coach: esta actividad requiere siguiente paso, fecha y hora. No la cierres en genérico.'+outlook:'IA Coach: chat/correo/WhatsApp suma 1 punto. No requiere siguiente paso obligatorio, pero agrega seguimiento si hay compromiso.';}\n}\nfunction val(id){return document.getElementById(id).value;}\nfunction calcQuality(a,b,c,d,date,time){let score=0;if(a.length>20)score+=20;if(b.length>15)score+=20;if(c.length>15)score+=20;if(d.length>8)score+=20;if(date&&time)score+=20;return score;}\n\n/* ===================== PIPELINE ===================== */\nfunction renderPipeline(area){\n  area.innerHTML=`<div style=\"display:flex;gap:11px;overflow-x:auto;padding-bottom:16px\">${Object.keys(FASES).map(stage=>`\n    <div class=\"pipe-col\">\n      <div class=\"pipe-col-h\">\n        <span>${FASES[stage]}<\u002Fspan>\n        <span class=\"pipe-badge\">${db.clients.filter(c=>byRole(c)&&c.stage===stage).length}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">${db.clients.filter(c=>byRole(c)&&c.stage===stage).map(clientCard).join('')||empty('Sin oportunidades')}<\u002Fdiv>\n    <\u002Fdiv>`).join('')}<\u002Fdiv>`;\n}\n\n/* ===================== VENTAS ===================== */\nfunction monthKey(dateStr){return(dateStr||todayISO()).slice(0,7);}\nfunction currentMonth(){return todayISO().slice(0,7);}\nfunction salesForMonth(month=currentMonth()){return db.sales.filter(s=>monthKey(s.date)===month);}\nfunction atcForMonth(month=currentMonth()){return(db.atc||[]).filter(a=>monthKey(a.date)===month);}\nfunction totalATC(month=currentMonth()){return atcForMonth(month).reduce((acc,a)=>({units:acc.units+Number(a.units||0),amount:acc.amount+Number(a.amount||0)}),{units:0,amount:0});}\nfunction directionForMonth(month=currentMonth()){return(db.directionSales||[]).filter(a=>monthKey(a.date)===month);}\nfunction totalDirection(month=currentMonth()){return directionForMonth(month).reduce((acc,a)=>({units:acc.units+Number(a.units||0),amount:acc.amount+Number(a.amount||0)}),{units:0,amount:0});}\nfunction salesTotals(month=currentMonth()){\n  const sales=salesForMonth(month),atc=totalATC(month),direction=totalDirection(month);\n  return{unitsNew:sales.filter(s=>s.clientType!=='Existente').reduce((a,b)=>a+Number(b.units||0),0)+direction.units,unitsExisting:sales.filter(s=>s.clientType==='Existente').reduce((a,b)=>a+Number(b.units||0),0)+atc.units,amount:sales.reduce((a,b)=>a+Number(b.amount||0),0)+atc.amount+direction.amount,units:sales.reduce((a,b)=>a+Number(b.units||0),0)+atc.units+direction.units,atcUnits:atc.units,atcAmount:atc.amount,directionUnits:direction.units,directionAmount:direction.amount};\n}\nfunction sellerReport(month=currentMonth()){\n  const rows={};activeSellers().forEach(s=>rows[s.name]={seller:s.name,units:0,newUnits:0,existingUnits:0,amount:0});\n  salesForMonth(month).forEach(s=>{if(!rows[s.seller])rows[s.seller]={seller:s.seller,units:0,newUnits:0,existingUnits:0,amount:0};rows[s.seller].units+=Number(s.units||0);rows[s.seller].amount+=Number(s.amount||0);if(s.clientType==='Existente')rows[s.seller].existingUnits+=Number(s.units||0);else rows[s.seller].newUnits+=Number(s.units||0);});\n  const atc=totalATC(month);rows['ATC']={seller:'ATC',units:atc.units,newUnits:0,existingUnits:atc.units,amount:atc.amount};\n  return Object.values(rows).sort((a,b)=>b.amount-a.amount);\n}\nfunction sourceReport(month=currentMonth()){\n  const map={};db.clients.forEach(c=>{if(!map[c.source||'Sin fuente'])map[c.source||'Sin fuente']={source:c.source||'Sin fuente',accounts:0,amount:0,units:0};map[c.source||'Sin fuente'].accounts+=1;});\n  salesForMonth(month).forEach(s=>{const c=db.clients.find(x=>x.id===s.clientId);const source=c?.source||s.source||'Sin fuente';if(!map[source])map[source]={source,accounts:0,amount:0,units:0};map[source].amount+=Number(s.amount||0);map[source].units+=Number(s.units||0);});\n  return Object.values(map).sort((a,b)=>b.amount-a.amount||b.accounts-a.accounts);\n}\n\nfunction renderVentas(area){\n  area.innerHTML=`<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px\">\n    <div class=\"card\" style=\"padding:22px\">\n      <h3 style=\"font-size:14px;font-weight:700;color:#0F172A;margin-bottom:4px\">Registrar venta del día<\u002Fh3>\n      <p style=\"font-size:11.5px;color:#94A3B8;margin-bottom:18px\">Venta cerrada por el equipo comercial<\u002Fp>\n      <form id=\"sale-form\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <select id=\"v-client\" class=\"input\" required>${db.clients.filter(byRole).map(c=>`<option value=\"${c.id}\">${c.name}<\u002Foption>`).join('')}<\u002Fselect>\n        <input id=\"v-product\" class=\"input\" placeholder=\"Producto: GPS, Dashcam, sensores...\" required>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n          <input id=\"v-units\" type=\"number\" class=\"input\" placeholder=\"Unidades\" required>\n          <input id=\"v-amount\" type=\"number\" class=\"input\" placeholder=\"Monto factura\" required>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n          <input id=\"v-date\" type=\"date\" class=\"input\" required>\n          <select id=\"v-pay\" class=\"input\"><option>Pagado<\u002Foption><option>Crédito<\u002Foption><option>50% anticipo<\u002Foption><option>Pendiente<\u002Foption><\u002Fselect>\n        <\u002Fdiv>\n        <select id=\"v-source\" class=\"input\"><option>Prospección propia<\u002Foption><option>Cliente existente<\u002Foption><option>Referido<\u002Foption><option>Expo<\u002Foption><option>Marketing<\u002Foption><option>LinkedIn<\u002Foption><option>Web<\u002Foption><\u002Fselect>\n        <textarea id=\"v-notes\" class=\"input\" style=\"height:70px\" placeholder=\"Notas de venta\"><\u002Ftextarea>\n        <button class=\"btn-green\" style=\"justify-content:center;padding:9px\">Guardar venta vendedor<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n    <div style=\"background:#001524;border-radius:12px;padding:22px\">\n      <h3 style=\"font-size:14px;font-weight:700;color:#82bc00;margin-bottom:4px\">Ventas Dirección<\u002Fh3>\n      <p style=\"font-size:11.5px;color:rgba(255,255,255,0.4);margin-bottom:18px\">Cuentas cerradas directamente por Dirección Comercial<\u002Fp>\n      <form id=\"direction-form\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <input id=\"dir-date\" type=\"date\" class=\"input\" required>\n        <input id=\"dir-client\" class=\"input\" placeholder=\"Cuenta / Proyecto\" required>\n        <input id=\"dir-units\" type=\"number\" class=\"input\" placeholder=\"Unidades Dirección\" required>\n        <input id=\"dir-amount\" type=\"number\" class=\"input\" placeholder=\"Monto Dirección\" required>\n        <textarea id=\"dir-notes\" class=\"input\" style=\"height:70px\" placeholder=\"Notas Dirección\"><\u002Ftextarea>\n        <button class=\"btn-green\" style=\"justify-content:center;padding:9px\">Guardar Venta Dirección<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:22px\">\n      <h3 style=\"font-size:14px;font-weight:700;color:#0F172A;margin-bottom:4px\">Registrar ATC<\u002Fh3>\n      <p style=\"font-size:11.5px;color:#94A3B8;margin-bottom:18px\">ATC solo registra clientes existentes<\u002Fp>\n      <form id=\"atc-form\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <input id=\"atc-date\" type=\"date\" class=\"input\" required>\n        <input id=\"atc-units\" type=\"number\" class=\"input\" placeholder=\"Unidades ATC\" required>\n        <input id=\"atc-amount\" type=\"number\" class=\"input\" placeholder=\"Monto pagado ATC\" required>\n        <textarea id=\"atc-notes\" class=\"input\" style=\"height:70px\" placeholder=\"Notas ATC\"><\u002Ftextarea>\n        <button class=\"btn-primary\" style=\"justify-content:center;padding:9px\">Guardar ATC<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"grid-column:span 3;padding:22px\">\n      <div class=\"slabel\" style=\"margin-bottom:14px\">Ventas registradas<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">${db.sales.filter(byRole).slice(-20).reverse().map(s=>`<div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:#F8FAFC;border-radius:8px;border:1px solid #F1F5F9\">\n        <div><p style=\"font-size:13px;font-weight:600;color:#0F172A\">${s.clientName}<\u002Fp><p style=\"font-size:11.5px;color:#64748B;margin-top:2px\">${s.product} · ${s.units} unidades · ${money(s.amount)}<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:right\"><p style=\"font-size:11px;color:#94A3B8\">${s.date}<\u002Fp><p style=\"font-size:11px;color:#94A3B8\">${s.seller} · ${s.source||''}<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>`).join('')||empty('Sin ventas registradas')}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  document.getElementById('v-date').value=todayISO();\n  document.getElementById('atc-date').value=todayISO();\n  document.getElementById('dir-date').value=todayISO();\n  document.getElementById('sale-form').onsubmit=e=>{\n    e.preventDefault();\n    const c=db.clients.find(x=>x.id==val('v-client'));\n    const seller=currentRole==='Admin'?c.seller:currentRole;\n    const clientType=c.type==='Existente'?'Existente':'Nuevo';\n    db.sales.push({id:Date.now(),clientId:c.id,clientName:c.name,seller,product:val('v-product'),units:Number(val('v-units')),amount:Number(val('v-amount')),date:val('v-date'),payMethod:val('v-pay'),source:val('v-source'),notes:val('v-notes'),clientType});\n    save();alert('Venta guardada.');renderVentas(area);\n  };\n  document.getElementById('direction-form').onsubmit=e=>{\n    e.preventDefault();\n    db.directionSales=db.directionSales||[];\n    db.directionSales.push({id:Date.now(),date:val('dir-date'),clientName:val('dir-client'),units:Number(val('dir-units')),amount:Number(val('dir-amount')),notes:val('dir-notes')});\n    save();alert('Venta Dirección guardada.');renderVentas(area);\n  };\n  document.getElementById('atc-form').onsubmit=e=>{\n    e.preventDefault();\n    db.atc=db.atc||[];\n    db.atc.push({id:Date.now(),date:val('atc-date'),units:Number(val('atc-units')),amount:Number(val('atc-amount')),notes:val('atc-notes')});\n    save();alert('ATC guardado.');renderVentas(area);\n  };\n}\n\n/* ===================== COACHING ===================== */\nfunction renderCoaching(area){\n  const min=db.settings.dailyMinPoints||30;\n  area.innerHTML=`\n    <div class=\"card\" style=\"padding:20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:20px\">\n      <div>\n        <div style=\"font-size:14px;font-weight:700;color:#0F172A\">Reporte diario de coaching<\u002Fdiv>\n        <p style=\"font-size:12px;color:#94A3B8;margin-top:3px\">Termómetro exacto: mínimo diario, calidad, pendientes y acción recomendada.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-shrink:0\">\n        <label style=\"font-size:11px;font-weight:600;color:#64748B\">Mínimo diario<\u002Flabel>\n        <input id=\"daily-min\" type=\"number\" value=\"${min}\" class=\"input\" style=\"width:90px\">\n        <button onclick=\"updateDailyMin()\" class=\"btn-primary\">Guardar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px\">\n      ${activeSellers().map(s=>{\n        const acts=db.activities.filter(a=>a.seller===s.name);\n        const todayActs=acts.filter(a=>a.date===todayISO());\n        const tasks=db.tasks.filter(t=>t.seller===s.name);\n        const todayPts=todayActs.reduce((a,b)=>a+(TASK_POINTS[b.type]||0),0);\n        const calls=todayActs.filter(a=>a.type==='Llamada').length;\n        const meetings=todayActs.filter(a=>a.type.includes('Reunión')).length;\n        const proposals=todayActs.filter(a=>a.type==='Propuesta').length;\n        const closes=db.sales.filter(v=>v.seller===s.name&&v.date===todayISO()).length;\n        const overdue=tasks.filter(t=>!t.completed&&t.date<todayISO()).length;\n        const tomorrow=tasks.filter(t=>!t.completed&&t.date>todayISO()).length;\n        const avgQ=todayActs.length?Math.round(todayActs.reduce((a,b)=>a+b.quality,0)/todayActs.length):0;\n        const pct=Math.min(100,Math.round((todayPts/min)*100));\n        const barColor=pct>=100?'#82bc00':pct>=60?'#F59E0B':'#EF4444';\n        const badgeBg=pct>=100?'#EEFAD4':pct>=60?'#FEF3C7':'#FEE2E2';\n        const badgeTx=pct>=100?'#4a7c00':pct>=60?'#B45309':'#B91C1C';\n        let advice='Debe cargar agenda y generar actividad antes del mediodía.';\n        if(todayPts>=min&&avgQ>=80)advice='Buen día: mantener ritmo y revisar oportunidades para cierre.';\n        else if(todayPts>=min&&avgQ<70)advice='Hay cantidad, falta calidad en notas, acuerdos y próximos pasos.';\n        else if(calls>0&&meetings===0)advice='Trabajar conversión de llamada a reunión; cerrar con fecha concreta.';\n        else if(overdue>0)advice='Prioridad: limpiar seguimientos vencidos hoy.';\n        else if(tomorrow<3)advice='Antes de salir, dejar agenda de mañana con mínimo 3 compromisos.';\n        return `<div class=\"card\" style=\"padding:20px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px\">\n            <div>\n              <div style=\"font-size:14px;font-weight:700;color:#0F172A\">${s.name}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#94A3B8;margin-top:2px\">${s.profile}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:12px;font-weight:700;color:${badgeTx};background:${badgeBg};padding:3px 10px;border-radius:6px\">${todayPts}/${min} pts<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"prog\" style=\"margin-bottom:14px\"><div class=\"prog-fill\" style=\"width:${pct}%;background:${barColor}\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px\">\n            ${mini('Llamadas',calls)}${mini('Reuniones',meetings)}${mini('Propuestas',proposals)}${mini('Cierres',closes)}\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px\">\n            ${mini('Calidad',avgQ+'%')}${mini('Vencidos',overdue)}${mini('Mañana',tomorrow)}\n          <\u002Fdiv>\n          <div style=\"padding:11px 13px;background:#F8FAFC;border-radius:8px;border:1px solid #F1F5F9\">\n            <div style=\"font-size:9.5px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px\">Acción recomendada<\u002Fdiv>\n            <p style=\"font-size:12.5px;font-weight:600;color:#0F172A\">${advice}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n      }).join('')}\n    <\u002Fdiv>`;\n}\n\nfunction mini(label,v){\n  return `<div style=\"background:#F8FAFC;border-radius:7px;border:1px solid #F1F5F9;padding:9px 6px;text-align:center\">\n    <div style=\"font-size:16px;font-weight:700;color:#0F172A;line-height:1\">${v}<\u002Fdiv>\n    <div style=\"font-size:9.5px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px\">${label}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction updateDailyMin(){db.settings.dailyMinPoints=Number(document.getElementById('daily-min').value||30);save();showView('coaching');}\n\n/* ===================== REPORTES ===================== */\nfunction copyReportText(){const text=document.getElementById('executive-report-text')?.innerText||'';navigator.clipboard?.writeText(text);alert('Reporte copiado al portapapeles.');}\n\nfunction executiveAIAnalysis(month=currentMonth()){\n  const acts=db.activities.filter(a=>monthKey(a.date)===month);\n  const tasks=db.tasks.filter(t=>monthKey(t.date)===month);\n  const sales=db.sales.filter(s=>monthKey(s.date)===month);\n  const totals=salesTotals(month);\n  const metaAmount=Number(db.settings.monthlyAmountGoal||600000);\n  const metaUnits=Number(db.settings.monthlyUnitGoal||150);\n  const quality=acts.length?Math.round(acts.reduce((a,b)=>a+(b.quality||0),0)/acts.length):0;\n  const effort=acts.reduce((a,b)=>a+(TASK_POINTS[b.type]||0),0);\n  const overdueCount=tasks.filter(t=>!t.completed&&t.date<todayISO()).length;\n  const amtPct=metaAmount>0?(totals.amount/metaAmount)*100:0;\n  const unitPct=metaUnits>0?(totals.units/metaUnits)*100:0;\n  const sellerRows=sellerReport(month).filter(r=>r.seller!=='ATC');\n  const topSeller=sellerRows.sort((a,b)=>b.amount-a.amount)[0];\n  const lowSellers=sellerRows.filter(r=>r.amount<(db.settings.sellerMonthlyAmountGoal||150000)*0.5);\n  const strengths=[],opportunities=[],redFlags=[],recommendations=[];\n  if(amtPct>=80)strengths.push(`Ventas en ${amtPct.toFixed(1)}% de la meta mensual.`);\n  if(quality>=70)strengths.push(`Calidad de notas en ${quality}%, por encima del estándar.`);\n  if(topSeller&&topSeller.amount>0)strengths.push(`${topSeller.seller} lidera ventas con ${money(topSeller.amount)}.`);\n  if(effort>200)strengths.push('Volumen de esfuerzo comercial alto en el período.');\n  if(amtPct<50)opportunities.push('Ventas por debajo del 50% de la meta. Revisar calidad de pipeline.');\n  if(quality<60)opportunities.push('Calidad de notas baja. Reforzar metodología de captura.');\n  if(lowSellers.length>0)opportunities.push(`${lowSellers.map(s=>s.seller).join(', ')} por debajo del 50% de meta individual.`);\n  if(overdueCount>5)redFlags.push(`${overdueCount} seguimientos vencidos sin capturar.`);\n  if(unitPct<30)redFlags.push('Unidades muy por debajo de la meta.');\n  if(acts.length<20)redFlags.push('Volumen de actividad comercial muy bajo para el período.');\n  if(overdueCount>0)recommendations.push('Sesión de limpieza de agenda: completar seguimientos vencidos antes del viernes.');\n  if(amtPct<80)recommendations.push('Revisión semanal de pipeline: identificar oportunidades en fase Propuesta/Negociación para cierre.');\n  recommendations.push('Priorizar conversión de llamada a reunión y de reunión a propuesta.');\n  const health=Math.min(100,Math.round(amtPct*0.4+quality*0.3+Math.min(effort/10,10)*3-overdueCount*2));\n  const status=health>=80?'Equipo en zona verde. Mantener ritmo.':health>=50?'Atención requerida en actividad o calidad.':'Intervención urgente necesaria.';\n  return{strengths,opportunities,redFlags,recommendations,health,status};\n}\n\nfunction executiveAIHTML(month){\n  const ai=executiveAIAnalysis(month);\n  const list=arr=>arr.length?arr.map(x=>`<li style=\"margin-bottom:4px\">${x}<\u002Fli>`).join(''):'<li style=\"color:#94A3B8\">Sin observaciones suficientes en el periodo.<\u002Fli>';\n  return `<div style=\"margin-top:20px\">\n    <div style=\"font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px\">Análisis Ejecutivo IA<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px\">\n      <div style=\"background:#F0FDF4;border-radius:9px;padding:14px\">\n        <div style=\"font-size:12px;font-weight:700;color:#15803D;margin-bottom:8px\">Fortalezas detectadas<\u002Fdiv>\n        <ul style=\"font-size:12px;color:#166534;padding-left:16px;line-height:1.6\">${list(ai.strengths)}<\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:#FFF7ED;border-radius:9px;padding:14px\">\n        <div style=\"font-size:12px;font-weight:700;color:#C2410C;margin-bottom:8px\">Áreas de oportunidad<\u002Fdiv>\n        <ul style=\"font-size:12px;color:#9A3412;padding-left:16px;line-height:1.6\">${list(ai.opportunities)}<\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FEF2F2;border-radius:9px;padding:14px;margin-bottom:12px\">\n      <div style=\"font-size:12px;font-weight:700;color:#B91C1C;margin-bottom:8px\">Focos rojos<\u002Fdiv>\n      <ul style=\"font-size:12px;color:#991B1B;padding-left:16px;line-height:1.6\">${list(ai.redFlags)}<\u002Ful>\n    <\u002Fdiv>\n    <div style=\"background:#EDE9FE;border-radius:9px;padding:14px;margin-bottom:12px\">\n      <div style=\"font-size:12px;font-weight:700;color:#6D28D9;margin-bottom:8px\">Recomendaciones para Dirección<\u002Fdiv>\n      <ul style=\"font-size:12px;color:#5B21B6;padding-left:16px;line-height:1.6\">${list(ai.recommendations)}<\u002Ful>\n    <\u002Fdiv>\n    <div style=\"background:#001524;border-radius:9px;padding:16px;text-align:center\">\n      <div style=\"font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px\">Salud Comercial General<\u002Fdiv>\n      <div style=\"font-size:36px;font-weight:800;color:#82bc00;letter-spacing:-0.02em\">${ai.health}<span style=\"font-size:18px;font-weight:600;color:rgba(255,255,255,0.4)\">/100<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);margin-top:4px\">${ai.status}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction updateReportGoals(){\n  db.settings.monthlyAmountGoal=Number(document.getElementById('report-goal-amount')?.value||600000);\n  db.settings.monthlyUnitGoal=Number(document.getElementById('report-goal-units')?.value||150);\n  db.settings.sellerMonthlyAmountGoal=Number(document.getElementById('report-seller-goal')?.value||150000);\n  save();showView('reportes');\n}\n\nfunction renderReportes(area){\n  const month=currentMonth();\n  const totals=salesTotals(month);\n  const metaAmount=Number(db.settings.monthlyAmountGoal||600000);\n  const metaUnits=Number(db.settings.monthlyUnitGoal||150);\n  const sellerRows=sellerReport(month).filter(r=>r.seller!=='ATC'&&r.seller!=='Alejandro');\n  const atc=totalATC(month),direction=totalDirection(month);\n  const sources=sourceReport(month);\n  area.innerHTML=`\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <div class=\"card\" style=\"padding:20px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap\">\n          <div>\n            <div style=\"font-size:15px;font-weight:700;color:#0F172A\">Informe Ejecutivo Mensual<\u002Fdiv>\n            <p style=\"font-size:12px;color:#94A3B8;margin-top:3px\">Separado por Dirección Comercial, ATC y Equipo de Vendedores.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n            <div><label style=\"font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px\">Meta $ equipo<\u002Flabel><input id=\"report-goal-amount\" type=\"number\" class=\"input\" style=\"width:140px\" value=\"${db.settings.monthlyAmountGoal||600000}\"><\u002Fdiv>\n            <div><label style=\"font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px\">Meta unidades<\u002Flabel><input id=\"report-goal-units\" type=\"number\" class=\"input\" style=\"width:120px\" value=\"${db.settings.monthlyUnitGoal||150}\"><\u002Fdiv>\n            <div><label style=\"font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px\">Meta $ x vendedor<\u002Flabel><input id=\"report-seller-goal\" type=\"number\" class=\
