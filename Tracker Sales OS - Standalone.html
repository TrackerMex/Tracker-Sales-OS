"input\" style=\"width:140px\" value=\"${db.settings.sellerMonthlyAmountGoal||150000}\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:7px\">\n              <button onclick=\"updateReportGoals()\" class=\"btn-green\">Guardar metas<\u002Fbutton>\n              <button onclick=\"copyReportText()\" class=\"btn-ghost\">Copiar informe<\u002Fbutton>\n              <button onclick=\"downloadExecutiveImage()\" class=\"btn-primary\">Abrir lámina<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"executive-slide\" style=\"background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:24px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px\">\n          <div>\n            <div style=\"font-size:18px;font-weight:800;color:#001524;letter-spacing:-0.02em\">TRACKER SALES OS<\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em;margin-top:3px\">Reporte Ejecutivo ${month}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right\">\n            <div style=\"font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em\">Resultado Global<\u002Fdiv>\n            <div style=\"font-size:24px;font-weight:800;color:#001524;letter-spacing:-0.02em;margin-top:2px\">${money(totals.amount)}<\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:600;color:#82bc00;margin-top:2px\">${totals.units} unidades<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"kpi-strip\" style=\"margin-bottom:18px\">\n          <div class=\"kpi-cell ac\"><div class=\"kl\">Ventas $<\u002Fdiv><div class=\"kv\" style=\"font-size:17px\">${money(totals.amount)}<\u002Fdiv><div class=\"ksb\">Meta: ${money(metaAmount)} · ${((totals.amount/metaAmount)*100).toFixed(1)}%<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi-cell\"><div class=\"kl\">Unidades<\u002Fdiv><div class=\"kv\">${totals.units}<\u002Fdiv><div class=\"ksb\">Meta: ${metaUnits} · ${((totals.units/metaUnits)*100).toFixed(1)}%<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi-cell\"><div class=\"kl\">Dirección Comercial<\u002Fdiv><div class=\"kv\" style=\"font-size:17px\">${money(direction.amount)}<\u002Fdiv><div class=\"ksb\">${direction.units} unidades<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi-cell\"><div class=\"kl\">ATC Existentes<\u002Fdiv><div class=\"kv\" style=\"font-size:17px\">${money(atc.amount)}<\u002Fdiv><div class=\"ksb\">${atc.units} unidades<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:240px 1fr;gap:14px;margin-bottom:14px\">\n          <div style=\"background:#EDE9FE;border-radius:10px;padding:16px\">\n            <div style=\"font-size:11px;font-weight:700;color:#6D28D9;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px\">Dirección Comercial<\u002Fdiv>\n            <p style=\"font-size:12px;color:#5B21B6;margin-bottom:10px\">Cuentas estratégicas cerradas por Dirección.<\u002Fp>\n            ${directionForMonth(month).length?directionForMonth(month).map(d=>`<div style=\"background:#fff;border-radius:7px;padding:9px;margin-bottom:6px\"><p style=\"font-size:12px;font-weight:600;color:#001524\">${d.clientName}<\u002Fp><p style=\"font-size:11px;color:#64748B\">${d.units} unidades · ${money(d.amount)}<\u002Fp><\u002Fdiv>`).join(''):'<p style=\"font-size:12px;color:#94A3B8\">Sin registros de Dirección este mes.<\u002Fp>'}\n          <\u002Fdiv>\n          <div style=\"background:#F8FAFC;border-radius:10px;padding:16px\">\n            <div style=\"font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px\">Equipo de Vendedores<\u002Fdiv>\n            <table class=\"dt\"><thead><tr><th>Vendedor<\u002Fth><th>Unidades<\u002Fth><th>Nuevas<\u002Fth><th>Existentes<\u002Fth><th>Monto<\u002Fth><\u002Ftr><\u002Fthead><tbody>${sellerRows.map(r=>`<tr><td style=\"font-weight:600;color:#0F172A\">${r.seller}<\u002Ftd><td>${r.units}<\u002Ftd><td>${r.newUnits}<\u002Ftd><td>${r.existingUnits}<\u002Ftd><td style=\"font-weight:600\">${money(r.amount)}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div style=\"background:#F0FDF4;border-radius:10px;padding:16px\">\n            <div style=\"font-size:11px;font-weight:700;color:#15803D;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px\">ATC<\u002Fdiv>\n            <p style=\"font-size:13px;font-weight:600;color:#166534\">${atc.units} unidades existentes · ${money(atc.amount)}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#F8FAFC;border-radius:10px;padding:16px\">\n            <div style=\"font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px\">Origen de cuentas<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:7px\">${sources.slice(0,6).map(s=>`<div style=\"background:#fff;border-radius:7px;padding:9px\"><p style=\"font-size:12px;font-weight:600;color:#0F172A\">${s.source}<\u002Fp><p style=\"font-size:11px;color:#64748B;margin-top:2px\">${s.accounts} cuentas · ${money(s.amount)}<\u002Fp><\u002Fdiv>`).join('')}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        ${executiveAIHTML(month)}\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:20px;overflow-x:auto\">\n        <div class=\"slabel\" style=\"margin-bottom:12px\">Detalle Top Vendedores<\u002Fdiv>\n        <table class=\"dt\"><thead><tr><th>Vendedor<\u002Fth><th>Unidades<\u002Fth><th>Nuevas<\u002Fth><th>Existentes<\u002Fth><th>Monto<\u002Fth><th>% Meta<\u002Fth><\u002Ftr><\u002Fthead><tbody>${sellerRows.map(r=>`<tr><td style=\"font-weight:600;color:#0F172A\">${r.seller}<\u002Ftd><td>${r.units}<\u002Ftd><td>${r.newUnits}<\u002Ftd><td>${r.existingUnits}<\u002Ftd><td style=\"font-weight:600\">${money(r.amount)}<\u002Ftd><td><span style=\"font-size:11px;font-weight:600;color:${(r.amount/(db.settings.sellerMonthlyAmountGoal||150000))>=1?'#4a7c00':'#B45309'}\">${((r.amount/(db.settings.sellerMonthlyAmountGoal||150000))*100).toFixed(1)}%<\u002Fspan><\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>\n      <\u002Fdiv>\n      <div id=\"executive-report-text\" class=\"card\" style=\"padding:20px\">\n        <div style=\"font-size:14px;font-weight:700;color:#0F172A;margin-bottom:12px\">Resumen para Dirección<\u002Fdiv>\n        <p style=\"font-size:13px;line-height:1.7;color:#475569\"><b>Meta vs Logro ${month}:<\u002Fb> Ventas globales: ${money(totals.amount)} contra meta de ${money(metaAmount)} (${((totals.amount/metaAmount)*100).toFixed(2)}%). Unidades: ${totals.units} contra meta de ${metaUnits} (${((totals.units/metaUnits)*100).toFixed(2)}%).<br><br><b>Dirección Comercial:<\u002Fb> ${direction.units} unidades por ${money(direction.amount)}.<br><b>ATC:<\u002Fb> ${atc.units} unidades existentes por ${money(atc.amount)}.<br><b>Equipo:<\u002Fb> ${sellerRows.slice(0,5).map(r=>`${r.seller}: ${r.units} unidades, ${money(r.amount)}`).join(' · ')}.<br><b>Origen de cuentas:<\u002Fb> ${sources.slice(0,5).map(s=>`${s.source}: ${s.accounts} cuentas, ${money(s.amount)}`).join(' · ')}.<br><b>Análisis IA:<\u002Fb> Salud comercial ${executiveAIAnalysis(month).health}/100 — ${executiveAIAnalysis(month).status}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction downloadExecutiveImage(){\n  const node=document.getElementById('executive-slide');\n  if(!node){alert('No se encontró el reporte ejecutivo.');return;}\n  const printWindow=window.open('','_blank');\n  printWindow.document.write(`<html><head><title>Reporte Ejecutivo Tracker<\u002Ftitle><link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\"><style>body{font-family:'Inter',sans-serif;background:#f1f5f9;padding:24px;color:#0F172A;}<\u002Fstyle><\u002Fhead><body>${node.outerHTML}<p style=\"font-size:12px;color:#94A3B8;margin-top:16px\">Tip: captura esta lámina o imprime como PDF para pegarla en PowerPoint.<\u002Fp><\u002Fbody><\u002Fhtml>`);\n  printWindow.document.close();\n}\n\n/* ===================== EQUIPO ===================== */\nfunction renderEquipo(area){\n  area.innerHTML=`<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px\">\n    <div class=\"card\" style=\"padding:20px\">\n      <div class=\"slabel\" style=\"margin-bottom:14px\">Alta comercial<\u002Fdiv>\n      <form id=\"seller-form\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <input id=\"s-name\" class=\"input\" placeholder=\"Nombre\" required>\n        <input id=\"s-profile\" class=\"input\" placeholder=\"Perfil / foco comercial\" required>\n        <button class=\"btn-primary\" style=\"justify-content:center\">Guardar comercial<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:20px\">\n      <div class=\"slabel\" style=\"margin-bottom:14px\">Crear usuario<\u002Fdiv>\n      <form id=\"user-form\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <input id=\"u-username\" class=\"input\" placeholder=\"Usuario\" required>\n        <input id=\"u-password\" class=\"input\" placeholder=\"Contraseña\" required>\n        <select id=\"u-role\" class=\"input\" onchange=\"document.getElementById('u-seller-wrap').style.display=this.value==='Admin'?'none':'block'\"><option value=\"Seller\">Comercial<\u002Foption><option value=\"Admin\">Dirección / Admin<\u002Foption><\u002Fselect>\n        <div id=\"u-seller-wrap\"><select id=\"u-seller\" class=\"input\">${activeSellers().map(s=>`<option>${s.name}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n        <button class=\"btn-green\" style=\"justify-content:center\">Crear acceso<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:20px\">\n      <div class=\"slabel\" style=\"margin-bottom:14px\">Usuarios del sistema<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;max-height:320px;overflow-y:auto\">\n        ${db.users.map(u=>`<div style=\"display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#F8FAFC;border-radius:8px;${u.active?'':'opacity:0.5'}\">\n          <div><p style=\"font-size:13px;font-weight:600;color:#0F172A\">${u.username}<\u002Fp><p style=\"font-size:11px;color:#94A3B8\">${u.role} · ${u.sellerName}<\u002Fp><\u002Fdiv>\n          <button onclick=\"toggleUser(${u.id})\" style=\"font-size:11px;font-weight:600;color:${u.active?'#DC2626':'#4a7c00'};background:none;border:none;cursor:pointer;font-family:inherit\">${u.active?'Bloquear':'Activar'}<\u002Fbutton>\n        <\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card\" style=\"padding:20px\">\n    <div class=\"slabel\" style=\"margin-bottom:14px\">Equipo comercial<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:9px\">\n      ${db.sellers.map(s=>`<div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#F8FAFC;border-radius:8px;${s.active?'':'opacity:0.5'}\">\n        <div><p style=\"font-size:13px;font-weight:600;color:#0F172A\">${s.name}<\u002Fp><p style=\"font-size:11px;color:#94A3B8;margin-top:2px\">${s.profile}<\u002Fp><\u002Fdiv>\n        <button onclick=\"toggleSeller(${s.id})\" style=\"font-size:11px;font-weight:600;color:${s.active?'#DC2626':'#4a7c00'};background:none;border:none;cursor:pointer;font-family:inherit\">${s.active?'Dar baja':'Reactivar'}<\u002Fbutton>\n      <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  document.getElementById('seller-form').onsubmit=e=>{e.preventDefault();db.sellers.push({id:Date.now(),name:val('s-name'),profile:val('s-profile'),active:true});save();initRoles();showView('equipo');};\n  document.getElementById('user-form').onsubmit=e=>{e.preventDefault();const role=val('u-role');const sellerName=role==='Admin'?'Admin':val('u-seller');db.users.push({id:Date.now(),username:val('u-username'),password:val('u-password'),name:sellerName,role,sellerName,active:true});save();showView('equipo');};\n}\nfunction toggleSeller(id){const s=db.sellers.find(x=>x.id===id);s.active=!s.active;save();initRoles();showView('equipo');}\nfunction toggleUser(id){const u=db.users.find(x=>x.id===id);if(u.username==='admin')return alert('El usuario admin inicial no se puede bloquear.');u.active=!u.active;save();showView('equipo');}\n\n/* ===================== DATOS ===================== */\nfunction renderDatos(area){\n  area.innerHTML=`<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:680px\">\n    <div class=\"card\" style=\"padding:22px\">\n      <div style=\"font-size:14px;font-weight:700;color:#0F172A;margin-bottom:5px\">Exportar respaldo<\u002Fdiv>\n      <p style=\"font-size:12px;color:#94A3B8;margin-bottom:18px\">Descarga toda la información en JSON.<\u002Fp>\n      <button onclick=\"exportJSON()\" class=\"btn-green\">Exportar JSON<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:22px\">\n      <div style=\"font-size:14px;font-weight:700;color:#0F172A;margin-bottom:5px\">Importar respaldo<\u002Fdiv>\n      <p style=\"font-size:12px;color:#94A3B8;margin-bottom:14px\">Restaura datos desde un archivo JSON previo.<\u002Fp>\n      <input id=\"import-file\" type=\"file\" accept=\".json\" class=\"input\" style=\"margin-bottom:10px\">\n      <button onclick=\"importJSON()\" class=\"btn-primary\">Importar JSON<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction exportJSON(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tracker_sales_os_respaldo.json';a.click();}\nfunction importJSON(){const f=document.getElementById('import-file').files[0];if(!f)return alert('Selecciona un archivo JSON');const r=new FileReader();r.onload=e=>{db=JSON.parse(e.target.result);save();initRoles();showView('dashboard');};r.readAsText(f);}\n\n/* ===================== DUPLICATES & CONTACTS ===================== */\nfunction normalizeText(v){return(v||'').toString().trim().toLowerCase();}\nfunction normalizePhone(v){return(v||'').toString().replace(/\\D/g,'');}\nfunction emailDomain(email){const e=normalizeText(email);return e.includes('@')?e.split('@').pop():'';}\nfunction clientContacts(c){return c.contacts||[];}\nfunction duplicateClientCheck(data,ignoreClientId=null){\n  const name=normalizeText(data.name),domain=normalizeText(data.domain);\n  const phones=(data.contacts||[]).map(x=>normalizePhone(x.phone)).filter(Boolean);\n  const emails=(data.contacts||[]).map(x=>normalizeText(x.email)).filter(Boolean);\n  const domains=[...new Set([...emails.map(emailDomain).filter(Boolean),domain].filter(Boolean))];\n  for(const c of db.clients){\n    if(ignoreClientId&&c.id===ignoreClientId)continue;\n    if(name&&normalizeText(c.name)===name)return`Ya existe una empresa registrada con el nombre: ${c.name}`;\n    const ec=clientContacts(c);\n    const ep=ec.map(x=>normalizePhone(x.phone)).filter(Boolean);\n    const ee=ec.map(x=>normalizeText(x.email)).filter(Boolean);\n    const ed=[...new Set([...ee.map(emailDomain).filter(Boolean),normalizeText(c.domain)].filter(Boolean))];\n    for(const p of phones){if(ep.includes(p))return`Ya existe un contacto con ese teléfono en: ${c.name}`;}\n    for(const e of emails){if(ee.includes(e))return`Ya existe un contacto con ese correo en: ${c.name}`;}\n    for(const d of domains){if(ed.includes(d))return`Ya existe un registro con el dominio ${d} en: ${c.name}`;}\n  }\n  return null;\n}\nfunction contactRowsHTML(contacts=[]){\n  const rows=contacts.length?contacts:[{id:Date.now(),name:'',role:'',phone:'',email:'',isDecisionMaker:false}];\n  return rows.map((ct,i)=>`\n    <div class=\"contact-row\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;padding:10px;background:#F8FAFC;border-radius:8px;border:1px solid #F1F5F9\" data-id=\"${ct.id||Date.now()+i}\">\n      <input class=\"input ct-name\" placeholder=\"Nombre contacto\" value=\"${ct.name||''}\">\n      <input class=\"input ct-role\" placeholder=\"Rol: decisor, finanzas...\" value=\"${ct.role||''}\">\n      <input class=\"input ct-phone\" placeholder=\"Teléfono\" value=\"${ct.phone||''}\">\n      <input class=\"input ct-email\" placeholder=\"Correo\" value=\"${ct.email||''}\">\n      <div style=\"display:flex;align-items:center;gap:8px;min-width:100px\">\n        <label style=\"font-size:11px;font-weight:600;color:#475569;white-space:nowrap;display:flex;align-items:center;gap:4px\"><input type=\"checkbox\" class=\"ct-decision\" ${ct.isDecisionMaker?'checked':''}> Decisor<\u002Flabel>\n        <button type=\"button\" onclick=\"this.closest('.contact-row').remove()\" style=\"color:#DC2626;background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit\">Quitar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\nfunction collectContacts(){\n  return[...document.querySelectorAll('.contact-row')].map(row=>({\n    id:Number(row.dataset.id)||Date.now(),name:row.querySelector('.ct-name').value.trim(),\n    role:row.querySelector('.ct-role').value.trim(),phone:row.querySelector('.ct-phone').value.trim(),\n    email:row.querySelector('.ct-email').value.trim(),isDecisionMaker:row.querySelector('.ct-decision').checked\n  })).filter(c=>c.name||c.phone||c.email||c.role);\n}\nfunction addContactRow(){document.getElementById('contacts-wrapper').insertAdjacentHTML('beforeend',contactRowsHTML([{id:Date.now(),name:'',role:'',phone:'',email:'',isDecisionMaker:false}]));}\nfunction primaryContactLabel(c){const contacts=clientContacts(c);const dm=contacts.find(x=>x.isDecisionMaker)||contacts[0];return dm?`${dm.name||'Sin nombre'}${dm.role?' · '+dm.role:''}`:(c.contact||'Sin contacto');}\n\n/* ===================== CLIENT FORM ===================== */\nfunction openClientForm(editId=null){\n  const editing=editId?db.clients.find(c=>c.id===editId):null;\n  const modal=`<div class=\"modal-blur\" id=\"client-modal\">\n    <div style=\"background:#fff;border-radius:14px;padding:28px;max-width:860px;width:100%;max-height:92vh;overflow-y:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px\">\n        <div style=\"font-size:16px;font-weight:700;color:#0F172A\">${editing?'Editar cliente / prospecto':'Nuevo cliente / prospecto'}<\u002Fdiv>\n        <button type=\"button\" onclick=\"document.getElementById('client-modal').remove()\" style=\"background:none;border:none;cursor:pointer;color:#94A3B8;font-size:18px;line-height:1;font-family:inherit\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:12px;color:#94A3B8;margin-bottom:20px\">Puedes registrar varios contactos: decisor, finanzas, operaciones, compras, etc.<\u002Fp>\n      <form id=\"client-form\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n        <input id=\"c-name\" class=\"input\" style=\"grid-column:span 2\" placeholder=\"Nombre de la cuenta\" value=\"${editing?.name||''}\" required>\n        <input id=\"c-domain\" class=\"input\" placeholder=\"Dominio web. Ej: empresa.com\" value=\"${editing?.domain||''}\">\n        <select id=\"c-type\" class=\"input\"><option ${editing?.type==='Nuevo'?'selected':''}>Nuevo<\u002Foption><option ${editing?.type==='Existente'?'selected':''}>Existente<\u002Foption><option ${editing?.type==='Prospecto'?'selected':''}>Prospecto<\u002Foption><\u002Fselect>\n        <select id=\"c-person\" class=\"input\"><option ${editing?.person==='Moral'?'selected':''}>Moral<\u002Foption><option ${editing?.person==='Física'?'selected':''}>Física<\u002Foption><\u002Fselect>\n        <select id=\"c-seller\" class=\"input\">${activeSellers().map(s=>`<option ${editing?.seller===s.name?'selected':''}>${s.name}<\u002Foption>`).join('')}<\u002Fselect>\n        <select id=\"c-source\" class=\"input\"><option>Prospección propia<\u002Foption><option>Cliente existente<\u002Foption><option>Referido<\u002Foption><option>Expo<\u002Foption><option>Marketing<\u002Foption><option>Web<\u002Foption><option>LinkedIn<\u002Foption><option>Facebook<\u002Foption><option>Dirección Comercial<\u002Foption><\u002Fselect>\n        <input id=\"c-provider\" class=\"input\" placeholder=\"Proveedor actual\" value=\"${editing?.provider||''}\">\n        <input id=\"c-units\" type=\"number\" class=\"input\" placeholder=\"Unidades potenciales\" value=\"${editing?.units||''}\">\n        <input id=\"c-amount\" type=\"number\" class=\"input\" placeholder=\"Monto esperado\" value=\"${editing?.expectedAmount||''}\">\n        <select id=\"c-stage\" class=\"input\">${Object.keys(FASES).map(f=>`<option value=\"${f}\" ${editing?.stage===f?'selected':''}>${FASES[f]}<\u002Foption>`).join('')}<\u002Fselect>\n        <div style=\"grid-column:span 2\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:9px\">\n            <div style=\"font-size:12px;font-weight:600;color:#475569\">Contactos del cliente<\u002Fdiv>\n            <button type=\"button\" onclick=\"addContactRow()\" class=\"btn-green\" style=\"padding:5px 10px;font-size:11px\">+ Agregar contacto<\u002Fbutton>\n          <\u002Fdiv>\n          <div id=\"contacts-wrapper\" style=\"display:flex;flex-direction:column;gap:7px\">${contactRowsHTML(editing?.contacts||[])}<\u002Fdiv>\n        <\u002Fdiv>\n        <textarea id=\"c-pain\" class=\"input\" style=\"grid-column:span 2;height:90px\" placeholder=\"¿Por qué crees que Tracker puede ayudarle? Dolor / necesidad detectada\">${editing?.pain||''}<\u002Ftextarea>\n        <div class=\"ai-box\" style=\"grid-column:span 2\">IA Coach: un buen registro debe identificar empresa, contactos clave, decisor, teléfono, correo/dominio y razón comercial.<\u002Fdiv>\n        <button class=\"btn-green\" style=\"grid-column:span 2;justify-content:center;padding:10px;font-size:13px\">${editing?'Guardar cambios':'Guardar cliente'}<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  document.body.insertAdjacentHTML('beforeend',modal);\n  if(editing?.source)document.getElementById('c-source').value=editing.source;\n  document.getElementById('client-form').onsubmit=e=>{\n    e.preventDefault();\n    const contacts=collectContacts();\n    const payload={name:val('c-name'),domain:val('c-domain'),contacts};\n    const duplicate=duplicateClientCheck(payload,editing?.id||null);\n    if(duplicate){alert('Candado anti-duplicado: '+duplicate);return;}\n    if(editing){\n      Object.assign(editing,{name:val('c-name'),domain:val('c-domain'),contact:contacts[0]?.name||'',phone:contacts[0]?.phone||'',email:contacts[0]?.email||'',contacts,type:val('c-type'),person:val('c-person'),source:val('c-source'),seller:val('c-seller'),stage:val('c-stage'),units:val('c-units'),expectedAmount:val('c-amount'),provider:val('c-provider'),pain:val('c-pain'),updatedAt:nowStamp()});\n    }else{\n      db.clients.push({id:Date.now(),name:val('c-name'),domain:val('c-domain'),contact:contacts[0]?.name||'',phone:contacts[0]?.phone||'',email:contacts[0]?.email||'',contacts,type:val('c-type'),person:val('c-person'),source:val('c-source'),seller:val('c-seller'),stage:val('c-stage'),units:val('c-units'),expectedAmount:val('c-amount'),provider:val('c-provider'),pain:val('c-pain'),nextStep:'',nextDate:'',nextTime:'',createdAt:nowStamp(),createdDate:todayISO(),logs:[]});\n    }\n    save();document.getElementById('client-modal').remove();showView('clientes');\n  };\n}\nfunction deleteClient(id){\n  const c=db.clients.find(x=>x.id===id);if(!c)return;\n  const hasActivity=db.activities.some(a=>a.clientId===id)||db.tasks.some(t=>t.clientId===id)||db.sales.some(s=>s.clientId===id);\n  const msg=hasActivity?`El cliente ${c.name} tiene actividades/tareas/ventas. ¿Seguro que quieres eliminarlo?`:`¿Eliminar ${c.name}?`;\n  if(!confirm(msg))return;\n  db.clients=db.clients.filter(x=>x.id!==id);db.activities=db.activities.filter(a=>a.clientId!==id);db.tasks=db.tasks.filter(t=>t.clientId!==id);db.sales=db.sales.filter(s=>s.clientId!==id);\n  save();showView('clientes');\n}\n\n/* ===================== TASK FORM ===================== */\nfunction contactOptionsForClient(clientId,selectedId=''){\n  const c=db.clients.find(x=>x.id==clientId);const contacts=clientContacts(c||{});\n  if(!contacts.length)return`<option value=\"\">Sin contactos registrados<\u002Foption>`;\n  return contacts.map(ct=>{const id=ct.id||'';const label=`${ct.name||'Sin nombre'}${ct.role?' · '+ct.role:''}${ct.isDecisionMaker?' · Decisor':''}`;return`<option value=\"${id}\" ${String(id)===String(selectedId)?'selected':''}>${label}<\u002Foption>`;}).join('');\n}\nfunction selectedContactFrom(clientId,contactId){const c=db.clients.find(x=>x.id==clientId);if(!c)return null;return clientContacts(c).find(ct=>String(ct.id)===String(contactId))||clientContacts(c)[0]||null;}\nfunction updateTaskContactOptions(){\n  const clientId=document.getElementById('q-client')?.value;\n  const wrap=document.getElementById('q-contact-select-wrap');if(!wrap)return;\n  wrap.innerHTML=`<select id=\"q-contact-id\" class=\"input\" onchange=\"syncTaskContactName();refreshTaskAI();\">${contactOptionsForClient(clientId)}<\u002Fselect>`;\n  syncTaskContactName();\n}\nfunction syncTaskContactName(){const clientId=document.getElementById('q-client')?.value;const contactId=document.getElementById('q-contact-id')?.value;const ct=selectedContactFrom(clientId,contactId);const input=document.getElementById('q-contact');if(input&&ct)input.value=`${ct.name||''}${ct.role?' · '+ct.role:''}`;}\nfunction updateActivityContactOptions(){const clientId=document.getElementById('a-client')?.value;const wrap=document.getElementById('a-contact-select-wrap');if(!wrap)return;wrap.innerHTML=`<select id=\"a-contact-id\" class=\"input\">${contactOptionsForClient(clientId)}<\u002Fselect>`;}\n\nfunction activityMixAdvice(){\n  const acts=db.activities.filter(a=>byRole(a)&&a.date===todayISO());\n  const salesToday=db.sales.filter(s=>byRole(s)&&s.date===todayISO()).length;\n  const chatCount=acts.filter(a=>['Chat','WhatsApp','Correo'].includes(a.type)).length;\n  const callCount=acts.filter(a=>a.type==='Llamada').length;\n  const meetingCount=acts.filter(a=>['Videoconferencia','Reunión virtual','Visita física','Reunión presencial'].includes(a.type)).length;\n  const proposalCount=acts.filter(a=>a.type==='Propuesta').length;\n  const closeActivities=acts.filter(a=>a.type==='Cierre'||a.result==='Cierre ganado').length;\n  let tips=[];\n  if(chatCount>=6&&callCount<3)tips.push('Tienes muchos chats/correos y pocas llamadas. Sube actividad de llamadas para generar conversación real.');\n  if(callCount>=8&&meetingCount<1)tips.push('Buen volumen de llamadas, pero poca conversión a reunión. En cada llamada pide una videollamada o fecha de revisión.');\n  if(meetingCount>=2&&proposalCount<1)tips.push('Ya hubo reuniones. Sube una propuesta con fecha de revisión para no enfriar la oportunidad.');\n  if(proposalCount>=2&&closeActivities<1&&salesToday<1)tips.push('Hay propuestas, pero falta empujar cierre. Valida decisor, presupuesto, forma de pago y fecha de compra.');\n  if(acts.length>0&&closeActivities<1&&salesToday<1)tips.push('Aún no hay actividad de cierre. Prioriza una llamada con el decisor de la oportunidad más avanzada.');\n  if(!tips.length)tips.push('Tu mezcla de actividad luce balanceada. Mantén llamadas y reuniones con siguiente paso fechado.');\n  return`<div style=\"display:flex;flex-direction:column;gap:7px;margin-top:10px\">${tips.map(t=>`<div class=\"ai-box\">IA Coach: ${t}<\u002Fdiv>`).join('')}<\u002Fdiv>`;\n}\n\nfunction aiTaskComment(t){\n  if(t.aiSuggestion)return t.aiSuggestion;\n  const text=((t.objective||'')+' '+(t.desc||'')+' '+(t.type||'')).toLowerCase();\n  if(t.date&&t.date<todayISO())return'Seguimiento vencido. Contactar hoy y cerrar con fecha/hora nueva.';\n  if(text.includes('propuesta'))return'Antes de enviar, confirma decisor, unidades, dolor, inversión y fecha de decisión.';\n  if(t.type==='Llamada')return'Abre con objetivo claro, valida dolor y termina con compromiso concreto.';\n  if(t.type&&t.type.includes('Reunión'))return'Lleva agenda: dolor, solución, objeciones, decisor y próximo paso.';\n  if(text.includes('cierre')||t.type==='Cierre')return'Pregunta directo: ¿qué falta para avanzar hoy?';\n  return'No cierres esta tarea sin acuerdo específico, responsable, fecha y hora.';\n}\n\nfunction quickTask(){\n  const modal=`<div class=\"modal-blur\" id=\"task-modal\">\n    <div style=\"background:#fff;border-radius:14px;padding:28px;max-width:640px;width:100%;max-height:92vh;overflow-y:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px\">\n        <div style=\"font-size:16px;font-weight:700;color:#0F172A\">Crear tarea con objetivo<\u002Fdiv>\n        <button type=\"button\" onclick=\"document.getElementById('task-modal').remove()\" style=\"background:none;border:none;cursor:pointer;color:#94A3B8;font-size:18px;font-family:inherit\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:12px;color:#94A3B8;margin-bottom:20px\">El comercial debe escribir qué hará, con quién y para qué.<\u002Fp>\n      <form id=\"task-form\" style=\"display:flex;flex-direction:column;gap:11px\">\n        <select id=\"q-client\" class=\"input\" onchange=\"updateTaskContactOptions();refreshTaskAI();\">\n          <option value=\"\">Sin cliente / prospecto nuevo<\u002Foption>\n          ${db.clients.filter(byRole).map(c=>`<option value=\"${c.id}\">${c.name}<\u002Foption>`).join('')}\n        <\u002Fselect>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n          <select id=\"q-type\" class=\"input\" onchange=\"refreshTaskAI()\">${Object.keys(TASK_POINTS).map(x=>`<option>${x}<\u002Foption>`).join('')}<\u002Fselect>\n          <div id=\"q-contact-select-wrap\"><select id=\"q-contact-id\" class=\"input\"><option value=\"\">Selecciona primero una empresa<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <input id=\"q-contact\" type=\"hidden\">\n        <textarea id=\"q-objective\" class=\"input\" style=\"height:110px\" placeholder=\"¿Qué vas a hacer y para qué? Ej. Llamaré a Gerardo para validar si realizará la compra este mes...\" required oninput=\"refreshTaskAI()\"><\u002Ftextarea>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n          <input id=\"q-date\" type=\"date\" class=\"input\" required>\n          <input id=\"q-time\" type=\"time\" class=\"input\" required>\n        <\u002Fdiv>\n        <div id=\"task-ai-preview\" class=\"ai-box\">IA Coach: escribe el objetivo de la tarea y te daré una sugerencia antes de guardar.<\u002Fdiv>\n        <div id=\"outlook-reminder\" style=\"display:none;padding:11px 13px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;font-size:12px;font-weight:600;color:#1D4ED8\">Recordatorio: si es videoconferencia o cita, registra también en Outlook.<\u002Fdiv>\n        <button class=\"btn-green\" style=\"justify-content:center;padding:10px;font-size:13px\">Guardar tarea<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  document.body.insertAdjacentHTML('beforeend',modal);\n  document.getElementById('q-date').value=todayISO();\n  document.getElementById('q-time').value='09:00';\n  updateTaskContactOptions();\n  document.getElementById('task-form').onsubmit=e=>{\n    e.preventDefault();\n    const c=db.clients.find(x=>x.id==val('q-client'));\n    const seller=currentRole==='Admin'?(c?c.seller:activeSellers()[0]?.name||'Admin'):currentRole;\n    const objective=val('q-objective');\n    const contactId=document.getElementById('q-contact-id')?.value||'';\n    const contactObj=selectedContactFrom(c?.id,contactId);\n    const contact=val('q-contact')||(contactObj?`${contactObj.name||''}${contactObj.role?' · '+contactObj.role:''}`:'');\n    const aiSuggestion=taskCreationSuggestion(val('q-type'),objective,contact,c);\n    db.tasks.push({id:Date.now(),seller,clientId:c?.id||null,clientName:c?.name||'',contact,contactId,contactRole:contactObj?.role||'',contactEmail:contactObj?.email||'',contactPhone:contactObj?.phone||'',type:val('q-type'),objective,desc:objective,date:val('q-date'),time:val('q-time'),createdAt:nowStamp(),completed:false,aiSuggestion});\n    save();document.getElementById('task-modal').remove();showView('agenda');\n  };\n}\nfunction refreshTaskAI(){\n  const box=document.getElementById('task-ai-preview');if(!box)return;\n  const c=db.clients.find(x=>x.id==document.getElementById('q-client')?.value);\n  const suggestion=taskCreationSuggestion(document.getElementById('q-type')?.value||'',document.getElementById('q-objective')?.value||'',document.getElementById('q-contact')?.value||'',c);\n  box.innerHTML=`<b>IA Coach:<\u002Fb> ${suggestion}`;\n  const out=document.getElementById('outlook-reminder');\n  const type=(document.getElementById('q-type')?.value||'').toLowerCase();\n  if(out)out.style.display=(type.includes('videoconferencia')||type.includes('reunión')||type.includes('visita'))?'block':'none';\n}\nfunction taskCreationSuggestion(type,objective,contact,client){\n  const t=(type||'').toLowerCase(),o=(objective||'').toLowerCase(),name=contact||client?.contact||'el contacto';\n  if(!objective||objective.trim().length<12)return'La tarea está muy abierta. Escribe: a quién contactarás, para qué, qué dato quieres obtener y qué compromiso buscarás cerrar.';\n  if(o.includes('compra')||o.includes('cierre')||o.includes('este mes'))return`Buena tarea de cierre. Con ${name}: confirma 1) unidades, 2) fecha de decisión, 3) quién autoriza, 4) forma de pago y 5) qué falta para avanzar hoy.`;\n  if(o.includes('propuesta')||o.includes('cotización'))return`Antes de enviar propuesta, valida con ${name}: dolor principal, número de unidades, proveedor actual, presupuesto y fecha de revisión.`;\n  if(o.includes('reunión')||t.includes('reunión')||t.includes('videoconferencia')||t.includes('visita'))return`Para la cita con ${name}, lleva agenda: problema, impacto económico, solución Tracker, objeciones, decisor y siguiente paso con fecha.`;\n  if(t.includes('llamada')||o.includes('llamar'))return`En la llamada con ${name}, evita solo \"dar seguimiento\". Abre con objetivo, haz 2 preguntas de dolor y cierra con un compromiso fechado.`;\n  return`Mejora: termina esta tarea con un resultado medible. Ejemplo: obtener reunión, confirmar unidades, identificar decisor, enviar propuesta o cerrar fecha de compra.`;\n}\nfunction completeTask(id){\n  const t=db.tasks.find(x=>x.id===id);\n  if(!t.clientId){t.completed=true;t.completedAt=nowStamp();t.capturedISO=new Date().toISOString();save();showView('agenda');return;}\n  showView('actividad');\n  setTimeout(()=>{\n    document.getElementById('a-client').value=t.clientId;document.getElementById('a-type').value=t.type;\n    updateActivityContactOptions();if(t.contactId&&document.getElementById('a-contact-id'))document.getElementById('a-contact-id').value=t.contactId;\n    document.getElementById('a-related-task').value=t.id;document.getElementById('a-programmed').value=(t.date||'')+' '+(t.time||'');\n    document.getElementById('a-exec-date').value=todayISO();document.getElementById('a-exec-time').value=nowTime();\n    toggleNextRequirement();\n  },50);\n}\n\n/* ===================== INIT ===================== */\nfunction repairAccessData(){\n  if(!db.users)db.users=[];\n  const admin=db.users.find(u=>u.username==='admin');\n  if(!admin){db.users.unshift({id:1,username:'admin',password:'tracker2026',name:'Dirección Comercial',role:'Admin',sellerName:'Admin',active:true});}\n  else{admin.password='tracker2026';admin.role='Admin';admin.sellerName='Admin';admin.active=true;}\n  if(!db.settings)db.settings={dailyMinPoints:30};\n  if(!db.settings.dailyMinPoints||db.settings.dailyMinPoints<30)db.settings.dailyMinPoints=30;\n  save();\n}\nrepairAccessData();\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
        </script>
    </body>
